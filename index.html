  { name: `6. Memory Model`, path: `04-memory-model.md`, dir: ``, words: 1266, mins: 6, body: `<h1 id="04--the-c-memory-model">04 — The C++ Memory Model</h1>
<p>This is the conceptual heart of the guide. The &ldquo;memory model&rdquo; is the set of rules
that define <strong>when a write by one thread is guaranteed to be visible to a read by
another</strong>. Every memory order is just a knob on this model. Take your time here.</p>
<hr />
<h2 id="1-the-vocabulary-you-must-internalize">1. The vocabulary you must internalize</h2>
<p>Four relations, from local to global:</p>
<pre><code>   1. SEQUENCED-BEFORE   : ordering WITHIN a single thread (program order-ish).
   2. SYNCHRONIZES-WITH  : a release operation pairs with an acquire operation
                           across threads (the cross-thread &quot;handshake&quot;).
   3. HAPPENS-BEFORE     : the transitive combination -&gt; the master relation.
                           If A happens-before B, A's effects are visible to B.
   4. MODIFICATION ORDER : for each atomic object, a single total order of all
                           writes to it (all threads agree on this per-object).
</code></pre>
<pre><code>      sequenced-before (in-thread)
              +  synchronizes-with (cross-thread handshake)
              =  HAPPENS-BEFORE  (what's visible to whom)
</code></pre>
<p>If there is <strong>no</strong> happens-before between a write and a read of the same
non-atomic location, and at least one is a write -&gt; <strong>data race -&gt; UB</strong>
(chapter 01). So happens-before is literally what keeps you out of UB.</p>
<hr />
<h2 id="2-sequenced-before-single-thread">2. Sequenced-before (single thread)</h2>
<p>Within one thread, statements are (mostly) ordered by program order. This is the
ordering you already intuit.</p>
<pre><code class="language-cpp">int a = 1;      // (1)
int b = 2;      // (2)   (1) is sequenced-before (2)
int c = a + b;  // (3)   (2) is sequenced-before (3)
</code></pre>
<pre><code>   (1) --seq-before--&gt; (2) --seq-before--&gt; (3)
   The compiler may reorder as long as the OBSERVABLE single-thread result is
   the same (&quot;as-if&quot; rule). Other threads can see the reordered version, though!
</code></pre>
<hr />
<h2 id="3-synchronizes-with-the-cross-thread-handshake">3. Synchronizes-with (the cross-thread handshake)</h2>
<p>The bridge between threads. The canonical case: a <strong>release store</strong> synchronizes
with an <strong>acquire load</strong> that reads the stored value.</p>
<pre><code>   Thread A                              Thread B
   -----------------------------         --------------------------------
   data = 42;                 (a)
   flag.store(1, release);    (b)  ~~~~&gt; while(flag.load(acquire)!=1){} (c)
                                          read data;                    (d)

   (b) SYNCHRONIZES-WITH (c)   [because (c) reads the value (b) stored, and
                                (b) is release, (c) is acquire]
</code></pre>
<pre><code>   The handshake requires ALL of:
     * (b) is a store with release (or stronger) ordering
     * (c) is a load  with acquire (or stronger) ordering
     * (c) actually READS the value written by (b) (or later in mod order via
       a release sequence)
</code></pre>
<hr />
<h2 id="4-happens-before--the-payoff">4. Happens-before = the payoff</h2>
<p>Combine sequenced-before + synchronizes-with transitively:</p>
<pre><code>   (a) seq-before (b)   [thread A: write data, then release]
   (b) sync-with  (c)   [the handshake]
   (c) seq-before (d)   [thread B: acquire, then read data]
   ------------------------------------------------------
   =&gt; (a) HAPPENS-BEFORE (d)
   =&gt; the write 'data = 42' is guaranteed visible to 'read data'
   =&gt; NO data race on 'data', even though 'data' is a PLAIN int.
</code></pre>
<pre><code>   A:  data=42 ──seq──▶ store-release(flag)
                              │ synchronizes-with
                              ▼
   B:                  load-acquire(flag) ──seq──▶ read data  (sees 42) ✓
</code></pre>
<p>This is the mechanism that lets one thread <strong>publish</strong> a whole data structure to
another by releasing a single flag/pointer. The acquire thread, upon seeing the
flag, is guaranteed to see everything the releaser did <em>before</em> the release.
This is <em>the</em> everyday use of atomics (chapter 06).</p>
<hr />
<h2 id="5-the-release-sequence-refinement-why-rmws-chain">5. The &ldquo;release sequence&rdquo; refinement (why RMWs chain)</h2>
<p>The acquiring thread doesn&rsquo;t have to read the <em>exact</em> value the releaser wrote —
it may read a later value produced by a chain of <strong>read-modify-write</strong> operations
on the same atomic. This chain is the <em>release sequence</em>, and it preserves the
handshake. This is what makes reference counting and queues work.</p>
<pre><code>   A: store-release(x, 1)
   B: fetch_add(x, ...)     (RMW — part of the release sequence headed by A)
   C: load-acquire(x)       reads C's value -&gt; STILL synchronizes-with A's store
   -&gt; A's prior writes are visible to C.
</code></pre>
<p>You rarely reason about this directly, but it&rsquo;s why acquire/release composes
through atomic counters.</p>
<hr />
<h2 id="6-modification-order--coherence">6. Modification order &amp; coherence</h2>
<p>For <strong>each individual atomic object</strong>, all threads agree on a single total order
of writes to it — its <em>modification order</em>. Four coherence guarantees follow
(they hold for <strong>any</strong> memory order, even relaxed):</p>
<pre><code>   Given a single atomic object M:
     write-write coherence : all threads see writes to M in the same order.
     read-read   coherence : a thread that reads a newer value of M never later
                             reads an older value of M.
     read-write / write-read coherence: similar consistency for the reader.

   -&gt; A SINGLE atomic variable is always &quot;coherent&quot; and never goes backwards
      for a given thread. Relaxed is enough for THAT ONE variable's own value.
</code></pre>
<p>The catch: coherence is <strong>per-object</strong>. It says nothing about ordering between
<em>different</em> variables. That cross-variable ordering is exactly what
acquire/release/seq_cst provide.</p>
<pre><code>   Coherence: relaxed gives you a sane view of ONE atomic's own history.
   Ordering (acquire/release/seq_cst): relationships ACROSS variables.
</code></pre>
<hr />
<h2 id="7-sequential-consistency-the-strongest-the-default">7. Sequential consistency (the strongest, the default)</h2>
<p><code>memory_order_seq_cst</code> (the default) adds, on top of acquire/release, a <strong>single
global total order</strong> <code>S</code> over <em>all</em> seq_cst operations that every thread agrees
on. This restores the intuitive &ldquo;one shared memory, consistent order&rdquo; illusion —
at a cost.</p>
<pre><code>   With seq_cst everywhere, you may reason AS IF:
     * all threads' operations are interleaved into ONE global sequence,
     * consistent with each thread's program order.

   This is the model in chapter 00's mental picture. It forbids the Store-Buffer
   litmus outcome (both reads = 0) from chapter 02 -&gt; at least one read sees 1.
</code></pre>

   It's the SAFE DEFAULT. Weaker orders drop the global order S (and some
   barriers) for speed — only do that when you can prove correctness.
</code></pre>
<hr />
<h2 id="8-putting-the-relations-in-one-picture">8. Putting the relations in one picture</h2>
<pre><code>                       THE C++ MEMORY MODEL
  ┌────────────────────────────────────────────────────────────────┐
  │ within a thread:        sequenced-before  (program order)      │
  │                                                                │
  │ across threads:         release ──synchronizes-with──▶ acquire │
  │                                                                │
  │ combine transitively:   HAPPENS-BEFORE                         │
  │     (A hb B  =&gt;  A's writes visible to B, no race)             │
  │                                                                │
  │ per atomic object:      MODIFICATION ORDER (coherence)         │
  │                                                                │
  │ seq_cst adds:           single GLOBAL total order S            │
  └────────────────────────────────────────────────────────────────┘
  Data race  =  conflicting access with NO happens-before  =  UB.
</code></pre>

assert(payload == 99);                      // (4) NEVER fires

   =&gt; (1) happens-before (4)

<p><code>std::memory_order</code> has six enumerators. This chapter defines each one, which
operations accept it, and shows the barrier each implies with diagrams. Chapters
06–08 then go deep on the important ones.</p>
<hr />
<h2 id="1-the-enumerators">1. The enumerators</h2>
<pre><code class="language-cpp">enum class memory_order {
    relaxed,   // no ordering, only atomicity + coherence
    consume,   // (discouraged; treated as acquire in practice)
    acquire,   // for loads / RMW: &quot;one-way barrier, nothing moves up past it&quot;
    release,   // for stores / RMW: &quot;one-way barrier, nothing moves down past it&quot;
    acq_rel,   // for RMW: acquire + release together
    seq_cst    // sequential consistency (the DEFAULT)
};
</code></pre>
<p>Aliases you&rsquo;ll see: <code>std::memory_order_relaxed</code>, <code>..._acquire</code>, etc. (C++20 also
lets you write <code>std::memory_order::acquire</code>).</p>
<hr />
<h2 id="2-which-order-is-valid-on-which-operation">2. Which order is valid on which operation</h2>
<p>Using the wrong order for an operation is a <strong>precondition violation</strong> (often
compile-time-checkable, always logically wrong):</p>
<pre><code>   Operation          Sensible orders
   ----------------   --------------------------------------------------
   load               relaxed, consume, acquire,           seq_cst
   store              relaxed,                   release,   seq_cst
   RMW (fetch_add,    relaxed, consume, acquire, release,  seq_cst
     exchange, CAS)     acq_rel
   fence              relaxed, acquire, release, acq_rel,  seq_cst

   Nonsense combos (don't do):
     store with acquire       (a store can't &quot;acquire&quot;)
     load  with release       (a load can't &quot;release&quot;)
</code></pre>
<pre><code>   Mnemonic:
     loads  ACQUIRE (pull in others' writes)
     stores RELEASE (push out your writes)
     RMW    both -&gt; acq_rel
</code></pre>
<hr />
<h2 id="3-relaxed--atomicity-only">3. <code>relaxed</code> — atomicity only</h2>
<pre><code>   GUARANTEES: the op is indivisible; per-object modification order/coherence.
   DOES NOT:   order this op relative to any OTHER memory operation.

   Use when: you only care about the atomic's own value, not about publishing
   or observing OTHER data (e.g. a statistics counter). See chapter 07.
</code></pre>
<pre><code>   relaxed load/store: the compiler &amp; CPU may freely reorder surrounding
   NON-dependent memory ops around it.

   x.store(1, relaxed);      // no fence; neighbors can move across this
   int v = y.load(relaxed);  // no fence
</code></pre>

<h2 id="4-acquire--a-downward-one-way-barrier-loads">4. <code>acquire</code> — a &ldquo;downward&rdquo; one-way barrier (loads)</h2>
<pre><code>   On a LOAD (or RMW): no reads or writes that appear AFTER it in program order
   may be reordered to BEFORE it. And it participates in synchronizes-with:
   it &quot;acquires&quot; everything the matching release published.

        ... code ...
   ┌───────────────────────┐
   │  X = a.load(acquire)  │
   └───────────┬───────────┘
               │  ⇩ operations below CANNOT rise above this load
        reads/writes after
</code></pre>

   everything the releaser did, and your subsequent ops stay after the acquire.
</code></pre>
<hr />
<h2 id="5-release--an-upward-one-way-barrier-stores">5. <code>release</code> — an &ldquo;upward&rdquo; one-way barrier (stores)</h2>
<pre><code>   On a STORE (or RMW): no reads or writes that appear BEFORE it in program
   order may be reordered to AFTER it. It &quot;releases&quot; (publishes) all prior work.

        reads/writes before
               │  ⇧ operations above CANNOT sink below this store
   ┌───────────┴───────────┐
   │  a.store(v, release)  │
   └───────────────────────┘
        ... code ...
</code></pre>

   release becomes visible to whoever acquires the value you stored.
</code></pre>
<h3 id="the-pair-in-one-diagram">The pair in one diagram</h3>
<pre><code>   Thread A (producer)                 Thread B (consumer)
   ───────────────────                 ────────────────────
   write data...          ⇧ can't        │
   ┌─────────────────┐    sink below     │

<h2 id="6-acq_rel--both-for-rmw">6. <code>acq_rel</code> — both, for RMW</h2>

   acquire : LoadLoad + LoadStore  (after the load)

   seq_cst : all of the above + StoreLoad + a single global order

   acquire/release  NO      (this is why the SB litmus can still bite them)
   seq_cst          YES
</code></pre>

   | 2. If profiling shows the atomic is hot, and you can PROVE it: |

<p>Acquire/release is the <strong>workhorse</strong> of correct, efficient atomic code. If you
learn one non-default ordering well, learn this. It&rsquo;s how you publish data
between threads without a mutex and without the cost of full <code>seq_cst</code>.</p>
<p>Prereq: <a href="04-memory-model.md">04-memory-model.md</a>, <a href="05-memory-orderings.md">05-memory-orderings.md</a>.</p>
<hr />
<h2 id="1-the-one-sentence-summary">1. The one-sentence summary</h2>
<pre><code>   A RELEASE store publishes everything the thread did BEFORE it.
   An ACQUIRE load that reads that store's value sees ALL of it.
   Together they form a one-way &quot;message&quot; from producer to consumer.
</code></pre>
<pre><code>   RELEASE = &quot;here's my finished work, sealed.&quot;   (producer)
   ACQUIRE = &quot;I've received it; now I can read.&quot;   (consumer)
</code></pre>
<hr />
<h2 id="2-message-passing-the-canonical-pattern">2. Message passing (the canonical pattern)</h2>
<pre><code class="language-cpp">#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;cassert&gt;

struct Message { int a, b, c; };
Message      msg;                 // plain (non-atomic) data
std::atomic&lt;bool&gt; ready{false};

void producer() {
    msg = {1, 2, 3};                               // (1) write payload
    ready.store(true, std::memory_order_release);  // (2) PUBLISH
}

void consumer() {
    while (!ready.load(std::memory_order_acquire)) // (3) wait for publish
        ;                                          //     (spin; see §7)
    assert(msg.a == 1 &amp;&amp; msg.b == 2 &amp;&amp; msg.c == 3);// (4) safe to read msg
}
</code></pre>
<pre><code>   (1) ─seq─▶ (2) ══sync-with══▶ (3) ─seq─▶ (4)
              release             acquire
   =&gt; (1) happens-before (4). msg is published atomically-consistently.
   'msg' is a PLAIN struct, yet there's NO data race, because the release/
   acquire handshake orders it. THIS is the superpower.
</code></pre>
<p>Note only <strong>one</strong> atomic (<code>ready</code>) is needed to safely transfer an entire
non-atomic payload.</p>
<hr />
<h2 id="3-the-one-way-barrier-nature-why-its-cheaper-than-seq_cst">3. The &ldquo;one-way barrier&rdquo; nature (why it&rsquo;s cheaper than seq_cst)</h2>
<p>Acquire and release are <strong>half fences</strong>. They only stop motion in one direction,
which is exactly enough for producer/consumer and cheaper than a full fence.</p>
<pre><code>   RELEASE store: prior ops can't move DOWN past it (but later ops can move UP).

        A;  B;  C;                 A,B,C are &quot;sealed below&quot;... they stay ABOVE
        store(release);   &lt;──────  ...but an unrelated later op D MAY move up.
        D;

   ACQUIRE load: later ops can't move UP past it (but earlier ops can move down).

        E;                         E MAY move down past the acquire.
        load(acquire);    &lt;──────  ...but F,G,H stay BELOW.
        F;  G;  H;
</code></pre>
<pre><code>   This asymmetry is why acquire/release don't prevent the Store-Buffer litmus
   outcome (chapter 02, both reads 0): a store-release followed by a load can
   still reorder (StoreLoad), because release only guards the &quot;down&quot; direction
   and acquire the &quot;up&quot; direction — neither stops store-then-load swapping.
   Only seq_cst (or a seq_cst fence) does. Keep this limitation in mind.
</code></pre>
<hr />
<h2 id="4-releaseacquire-on-the-same-variable-transfers-ownership">4. Release/acquire on the SAME variable transfers ownership</h2>
<p>A pointer published with release/acquire hands off an entire object graph:</p>
<pre><code class="language-cpp">std::atomic&lt;Node*&gt; head{nullptr};

// Producer builds a node, then publishes:
Node* n = new Node{...};       // fully construct (writes to *n)
n-&gt;next = ...;
head.store(n, std::memory_order_release);   // publish pointer

// Consumer:
Node* p = head.load(std::memory_order_acquire);
if (p) use(p-&gt;next);           // sees the fully-constructed node, no race
</code></pre>
<pre><code>   The release &quot;seals&quot; all writes to *n BEFORE the store.
   The acquire loading the pointer guarantees those writes are visible.
   -&gt; classic lock-free publish. (This underlies queues/stacks, chapter 11.)
</code></pre>
<hr />
<h2 id="5-releaseacquire-is-transitive-happens-before-chains">5. Release/acquire is TRANSITIVE (happens-before chains)</h2>
<p>Because happens-before is transitive, ordering chains through intermediaries:</p>
<pre><code>   A: data=1; flagA.store(release)
   B: while(!flagA.load(acquire)); ... ; flagB.store(release)
   C: while(!flagB.load(acquire)); read data;   // sees data==1

   A ──sync──▶ B ──sync──▶ C   =&gt; A happens-before C =&gt; 'data' visible in C.
</code></pre>
<p>This lets you build pipelines where each stage publishes to the next.</p>
<hr />
<h2 id="6-rmw-with-acq_rel-locks-and-counters-that-publish">6. RMW with acq_rel: locks and counters that publish</h2>
<p>When an operation must both <em>observe</em> others&rsquo; work and <em>publish</em> its own, use an
RMW with <code>acq_rel</code> (or <code>acquire</code> on the acquire side, <code>release</code> on the release
side).</p>
<h3 id="a-mutex-like-handoff-conceptual">A mutex-like handoff (conceptual)</h3>
<pre><code class="language-cpp">std::atomic&lt;bool&gt; locked{false};

void lock() {
    bool expected = false;
    while (!locked.compare_exchange_weak(expected, true,
               std::memory_order_acquire,      // success: ACQUIRE the lock
               std::memory_order_relaxed)) {   // failure: no ordering needed
        expected = false;
    }
}
void unlock() {
    locked.store(false, std::memory_order_release); // RELEASE the lock
}
</code></pre>
<pre><code>   lock():   acquire -&gt; sees everything the previous holder did before unlock.
   unlock(): release -&gt; publishes this holder's work to the next locker.
   -&gt; the classic critical-section handshake, hand-built. (Real spinlock:
      chapter 12.)
</code></pre>
<h3 id="reference-counting">Reference counting</h3>
<pre><code class="language-cpp">// increment: relaxed is fine (just counting, no data published by the inc)
refcount.fetch_add(1, std::memory_order_relaxed);

// decrement: must be a release so that another thread's destructor (which
// acquires) sees all our uses of the object BEFORE we dropped the ref.
if (refcount.fetch_sub(1, std::memory_order_acq_rel) == 1) {
    // last reference -&gt; we now own it exclusively; delete safely.
    delete ptr;
}
</code></pre>
<pre><code>   This is exactly how std::shared_ptr's control block works: relaxed inc,
   acq_rel (or release + acquire fence) dec, so the final deleter sees all
   prior uses. Getting this wrong = use-after-free.
</code></pre>
<p>Runnable: <a href="examples/ch06_refcount.cpp"><code>examples/ch06_refcount.cpp</code></a>.</p>
<hr />
<h2 id="7-dont-hand-spin-if-you-can-avoid-it-c20-waitnotify">7. Don&rsquo;t hand-spin if you can avoid it (C++20 wait/notify)</h2>
<p>The <code>while(!ready.load(acquire));</code> busy-wait burns CPU. C++20 adds efficient
<code>wait</code>/<code>notify</code> on atomics (chapter 13):</p>
<pre><code class="language-cpp">// consumer
ready.wait(false, std::memory_order_acquire);  // sleeps until value != false
// producer
ready.store(true, std::memory_order_release);
ready.notify_one();                             // wake a waiter
</code></pre>
<pre><code>   .wait(old): blocks while value == old (efficient OS wait, not a spin).
   .notify_one()/.notify_all(): wake waiters after you store.
   Same acquire/release semantics, but no CPU-burning spin.
</code></pre>
<hr />
<h2 id="8-common-mistakes">8. Common mistakes</h2>
<pre><code>   * Using relaxed on the flag &quot;to be fast&quot; -&gt; breaks publishing -&gt; UB.
     The whole point of the flag is to order OTHER data; relaxed can't.
   * Acquire on the producer / release on the consumer (backwards). Producer
     STORES (release); consumer LOADS (acquire).
   * Publishing with release but the consumer reads the payload with a DIFFERENT
     atomic that wasn't part of the handshake -&gt; no ordering.
   * Assuming acquire/release stops StoreLoad reordering (it doesn't; that needs
     seq_cst). If two threads each store-then-load different vars and you need
     &quot;at least one sees the other,&quot; you need seq_cst.
   * Forgetting the payload write must be BEFORE the release store in program
     order (that's what gets published).
</code></pre>
<hr />
<h2 id="9-when-to-prefer-seq_cst-over-acquirerelease">9. When to prefer seq_cst over acquire/release</h2>
<pre><code>   Use seq_cst when correctness depends on a GLOBAL order across MULTIPLE atomic
   variables — e.g. Dekker/Peterson-style mutual exclusion, or &quot;if I don't see
   your flag, you must see mine.&quot; Acquire/release is per-handshake and cannot
   provide a single agreed-upon global order. When unsure -&gt; seq_cst.
</code></pre>
<hr />
<h2 id="10-summary">10. Summary</h2>
<div class="diagram"><div class="diagram-title">Acquire-release summary</div><div class="dbox green"><div class="dbox-title">Message passing</div><div class="dtext"><b>RELEASE</b> store publishes all prior writes; <b>ACQUIRE</b> load that reads it sees them all</div><div class="dtext">Lock-free message passing / ownership handoff with <b>ONE</b> atomic guarding arbitrary non-atomic data</div></div><div class="dbox orange"><div class="dbox-title">Limitations</div><div class="dtext">They are <b>ONE-WAY</b> (half) barriers -&gt; cheaper than <code>seq_cst</code>, but do <b>NOT</b> stop StoreLoad reordering (SB litmus) — that needs <code>seq_cst</code></div></div><div class="dbox teal"><div class="dbox-title">Usage</div><div class="dtext">Producer <code>STORE(release)</code>; consumer <code>LOAD(acquire)</code>. Not backwards</div><div class="dtext">RMW that both observes &amp; publishes -&gt; <code>acq_rel</code> (locks, refcounts)</div><div class="dtext">Prefer C++20 wait/notify over hand-spinning</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+

 | it sees them all. -&gt; lock-free message passing / ownership handoff|

 |                                                                  |

 | do NOT stop StoreLoad reordering (SB litmus) — that needs seq_cst.|
 |                                                                  |

 | RMW that both observes &amp; publishes -&gt; acq_rel (locks, refcounts). |
 | Prefer C++20 wait/notify over hand-spinning.                     |
 +------------------------------------------------------------------+</code></pre></details>
<p>Next: <a href="07-relaxed.md">07-relaxed.md</a>.</p>` },
  { name: `9. Relaxed`, path: `07-relaxed.md`, dir: ``, words: 969, mins: 5, body: `<h1 id="07--relaxed-ordering">07 — Relaxed Ordering</h1>
<p><code>memory_order_relaxed</code> is the fastest and the most dangerous. It guarantees
<strong>atomicity and per-object coherence</strong> but <strong>no ordering</strong> relative to other
memory. This chapter shows the few cases where it&rsquo;s genuinely correct and the
many where it silently isn&rsquo;t.</p>
<hr />
<h2 id="1-what-relaxed-guarantees-and-only-this">1. What relaxed guarantees (and only this)</h2>
<pre><code>   GUARANTEES:
     * The operation is atomic (indivisible, no torn values).
     * Per-object coherence: all threads agree on the modification order of
       THIS ONE atomic; a thread never reads it &quot;going backwards&quot; (chapter 04).

   DOES NOT GUARANTEE:
     * Any ordering with respect to OTHER variables (atomic or not).
     * That other threads see this write &quot;soon&quot; (only eventually).
     * Any happens-before / publishing of surrounding data.
</code></pre>
<pre><code>   Relaxed = &quot;a thread-safe number.&quot; Nothing about the world AROUND it is ordered.
</code></pre>
<hr />
<h2 id="2-the-poster-child-a-statistics-counter">2. The poster child: a statistics counter</h2>
<p>The one universally-safe relaxed use — you only care about the final total, not
about ordering it against other data.</p>
<pre><code class="language-cpp">std::atomic&lt;long&gt; hits{0};

void on_request() {
    hits.fetch_add(1, std::memory_order_relaxed);   // just counting
}

// later, after all threads joined (join provides the ordering):
long total = hits.load(std::memory_order_relaxed);  // exact count
</code></pre>
<pre><code>   Why safe:
     * Each fetch_add is atomic -&gt; no lost updates (chapter 00).
     * We don't use 'hits' to guard other data, so ordering doesn't matter.
     * We read the total only AFTER join(), which itself creates happens-before.
   Result: exact count, minimal overhead. THIS is relaxed's sweet spot.
</code></pre>
<p>Runnable: <a href="examples/ch07_relaxed_counter.cpp"><code>examples/ch07_relaxed_counter.cpp</code></a>.</p>
<hr />
<h2 id="3-when-relaxed-is-wrong-publishing-data">3. When relaxed is WRONG: publishing data</h2>
<p>If the atomic is meant to signal that <em>other</em> data is ready, relaxed breaks it.</p>
<pre><code class="language-cpp">int data = 0;
std::atomic&lt;bool&gt; ready{false};

// Producer
data = 42;
ready.store(true, std::memory_order_relaxed);   // BUG

// Consumer
while (!ready.load(std::memory_order_relaxed)) {}
use(data);                                       // may see 0 / garbage -&gt; UB
</code></pre>
<pre><code>   No release/acquire -&gt; no synchronizes-with -&gt; no happens-before on 'data'.
   The consumer may observe ready==true while 'data' is still 0 (the two
   stores can reorder / not be visible together).
   -&gt; DATA RACE on 'data' -&gt; UNDEFINED BEHAVIOR.
   Fix: release on the store, acquire on the load (chapter 06).
</code></pre>
<hr />
<h2 id="4-the-subtle-trap-relaxed-gives-no-ordering-across-two-atomics">4. The subtle trap: relaxed gives NO ordering across two atomics</h2>
<p>Even between two <em>atomic</em> variables, relaxed provides no cross-variable ordering.</p>
<pre><code class="language-cpp">std::atomic&lt;int&gt; x{0}, y{0};

// Thread A                         // Thread B
x.store(1, relaxed);                int b = y.load(relaxed);   // may see 1
y.store(1, relaxed);                int a = x.load(relaxed);   // may see 0!
</code></pre>
<pre><code>   B can observe y==1 but x==0, even though A wrote x BEFORE y.
   Relaxed doesn't order x relative to y. Each variable is independently
   coherent, but there's no combined ordering.
   -&gt; Never use relaxed when the RELATIVE order of two variables matters.
</code></pre>
<hr />
<h2 id="5-relaxed-is-fine-for-a-single-variables-own-logic">5. Relaxed IS fine for a single variable&rsquo;s own logic</h2>
<p>Because of coherence, reasoning about <strong>one</strong> relaxed atomic in isolation is
sound:</p>
<pre><code>   Safe relaxed uses (single-variable, value-only):
     * event/hit/error counters aggregated at the end
     * &quot;generation&quot;/sequence numbers used only for equality/monotonic checks
       on that same variable
     * setting a one-shot &quot;shutdown requested&quot; flag WHERE the reader does no
       ordered work depending on other data (rare; usually you DO -&gt; use acquire)
     * an ID allocator: fetch_add to hand out unique IDs
</code></pre>
<pre><code class="language-cpp">std::atomic&lt;unsigned&gt; next_id{0};
unsigned allocate_id() { return next_id.fetch_add(1, std::memory_order_relaxed); }
// Each caller gets a unique, never-repeated ID. No other data is ordered by it.
</code></pre>
<hr />
<h2 id="6-relaxed--a-later-fence">6. Relaxed + a later fence</h2>
<p>A common efficient pattern: do many relaxed ops, then one fence to establish
ordering at a boundary (chapter 09):</p>
<pre><code class="language-cpp">// accumulate with relaxed, then publish once:
buffer_filled.store(n, std::memory_order_relaxed);
// ... more relaxed writes ...
std::atomic_thread_fence(std::memory_order_release);  // one barrier
done.store(true, std::memory_order_relaxed);          // now acts like release
</code></pre>
<p>We cover standalone fences in chapter 09; the point here is relaxed ops can be
&ldquo;upgraded&rdquo; collectively by a fence rather than paying per-op ordering.</p>
<hr />
<h2 id="7-performance-reality-check">7. Performance reality check</h2>
<pre><code>   On x86: relaxed vs acquire/release loads/stores often compile to the SAME
   instruction (plain mov). The savings come mostly from the COMPILER being
   free to reorder — and from avoiding the seq_cst StoreLoad fence.

   On ARM/POWER: relaxed really is cheaper (no barrier instructions), so the
   difference is real. But so is the risk.

   -&gt; Don't reach for relaxed on x86 &quot;for speed&quot;; you often gain nothing and
      risk portability bugs that only show up on ARM. Measure first.
</code></pre>
<hr />
<h2 id="8-decision-checklist-for-using-relaxed">8. Decision checklist for using relaxed</h2>
<pre><code>   Use relaxed ONLY if ALL are true:
     [ ] You care solely about this atomic's own value (a count/flag/id).
     [ ] No other (atomic or non-atomic) data's visibility depends on it.
     [ ] You don't rely on its ordering relative to any other variable.
     [ ] Any final read that needs consistency is after a join/lock/fence.
   If ANY box is unchecked -&gt; use acquire/release (or seq_cst).
</code></pre>
<hr />
<h2 id="9-worked-contrast-correct-vs-broken">9. Worked contrast: correct vs broken</h2>
<pre><code class="language-cpp">// CORRECT relaxed: pure counter
std::atomic&lt;long&gt; counter{0};
void inc() { counter.fetch_add(1, std::memory_order_relaxed); }

// BROKEN relaxed: flag guarding data (needs release/acquire)
int payload; std::atomic&lt;bool&gt; flag{false};
void produce() { payload = 7; flag.store(true, std::memory_order_relaxed); } // BUG
void consume() { while(!flag.load(std::memory_order_relaxed)); use(payload);}// UB
</code></pre>
<p>Run <a href="examples/ch07_relaxed_counter.cpp"><code>examples/ch07_relaxed_counter.cpp</code></a>
(correct) and inspect the broken pattern under TSan to see the race.</p>
<hr />
<h2 id="10-summary">10. Summary</h2>
<div class="diagram"><div class="diagram-title">Relaxed ordering summary</div><div class="dbox gray"><div class="dbox-title">relaxed</div><div class="dtext">Atomicity + per-object coherence, <b>NOTHING ELSE</b></div></div><div class="dbox green"><div class="dbox-title">GOOD</div><div class="dtext">Standalone counters, unique-id allocators, stats gathered after join — value-only, single-variable uses</div></div><div class="dbox red"><div class="dbox-title">BAD</div><div class="dtext">Publishing/consuming other data, ordering across two vars, any "flag means X is ready" scenario -&gt; use acquire/release</div></div><div class="dbox orange"><div class="dbox-title">Portability</div><div class="dtext">On x86 the "speed win" is often zero; the portability <b>RISK</b> is real (bugs surface on ARM). Default away from relaxed</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | relaxed = atomicity + per-object coherence, NOTHING ELSE.        |
 |                                                                  |
 | GOOD: standalone counters, unique-id allocators, stats gathered  |
 |       after join — value-only, single-variable uses.            |
 | BAD:  publishing/consuming other data, ordering across two vars, |
 |       any "flag means X is ready" scenario -&gt; use acquire/release.|
 |                                                                  |
 | On x86 the "speed win" is often zero; the portability RISK is    |
 | real (bugs surface on ARM). Default away from relaxed.          |
 +------------------------------------------------------------------+</code></pre></details>
<p>Next: <a href="08-seq-cst-and-consume.md">08-seq-cst-and-consume.md</a>.</p>` },
  { name: `10. Seq Cst And Consume`, path: `08-seq-cst-and-consume.md`, dir: ``, words: 915, mins: 5, body: `<h1 id="08--seq_cst-the-safe-default--consume-the-cautionary-tale">08 — <code>seq_cst</code> (The Safe Default) &amp; <code>consume</code> (The Cautionary Tale)</h1>
<p>Two orderings at opposite ends of the &ldquo;should I use this?&rdquo; spectrum:
<code>seq_cst</code> — the strong, correct default you should reach for first; and
<code>consume</code> — a clever idea that never worked out and is now discouraged.</p>
<hr />
<h2 id="part-a-memory_order_seq_cst">Part A: <code>memory_order_seq_cst</code></h2>
<h3 id="1-what-it-adds">1. What it adds</h3>
<pre><code>   seq_cst = acquire (on loads) + release (on stores) + acq_rel (on RMW)
             PLUS a single GLOBAL TOTAL ORDER S over ALL seq_cst operations
             that every thread agrees on.
</code></pre>
<pre><code>   With everything seq_cst, you may reason as if there is ONE interleaving of
   all operations, consistent with each thread's program order — the intuitive
   &quot;shared memory&quot; model from chapter 00. This is the easiest to reason about.
</code></pre>
<h3 id="2-its-the-default-on-purpose">2. It&rsquo;s the default (on purpose)</h3>
<pre><code class="language-cpp">std::atomic&lt;int&gt; x{0};
x.store(1);          // == x.store(1, std::memory_order_seq_cst)
int v = x.load();    // == x.load(std::memory_order_seq_cst)
++x;                 // seq_cst RMW
</code></pre>
<p>The committee made <code>seq_cst</code> the default because it&rsquo;s the <strong>least surprising</strong>
and the hardest to get subtly wrong. Start here; weaken only with proof.</p>
<h3 id="3-what-it-prevents-that-acquirerelease-does-not">3. What it prevents that acquire/release does not</h3>
<p>The Store-Buffer litmus (chapters 02, 06): with acquire/release, both threads can
read 0. With seq_cst, they cannot.</p>
<pre><code class="language-cpp">std::atomic&lt;int&gt; x{0}, y{0};
int r1, r2;

// Thread A                         // Thread B
x.store(1, seq_cst);                y.store(1, seq_cst);
r1 = y.load(seq_cst);               r2 = x.load(seq_cst);
</code></pre>
<pre><code>   Global order S must place the four ops in SOME consistent total order.
   In every such order, at least one load comes after both stores.
   =&gt; r1==0 &amp;&amp; r2==0 is IMPOSSIBLE with seq_cst.
   (With relaxed/acq_rel it IS possible — this is the key difference.)
</code></pre>
<pre><code>   Any valid S, e.g.:  x.store, y.store, r1=y(=1), r2=x(=1)   -&gt; not both 0
   There's no S where both loads precede both stores while respecting program
   order. seq_cst forbids the &quot;both 0&quot; outcome.
</code></pre>
<h3 id="4-when-you-actually-need-seq_cst">4. When you actually NEED seq_cst</h3>
<pre><code>   * Mutual-exclusion algorithms (Dekker, Peterson): &quot;if I don't see your flag,
     you must see mine&quot; requires a global order.
   * Any invariant of the form &quot;at least one of several threads observes the
     other's write&quot; across DIFFERENT variables.
   * When you're not sure. Correct-and-maybe-slower beats fast-and-wrong.
</code></pre>
<h3 id="5-the-cost">5. The cost</h3>
<pre><code>   x86: seq_cst LOADS are cheap (plain mov); seq_cst STORES need an
        xchg / mfence (the StoreLoad barrier). So stores are the expensive part.
   ARM/POWER: seq_cst needs stronger barriers (e.g. dmb ish / sync) on both
        sides -&gt; noticeably pricier than acquire/release.
   -&gt; If a seq_cst atomic is hot AND you can prove acquire/release suffices,
      that's the main win. Otherwise keep seq_cst.
</code></pre>
<h3 id="6-a-subtlety-mixing-seq_cst-with-weaker-orders">6. A subtlety: mixing seq_cst with weaker orders</h3>
<pre><code>   The global order S only governs seq_cst operations. If you mix a relaxed or
   acquire/release op into the mix, it does NOT participate in S, and the strong
   guarantees can be lost. For the &quot;at least one sees the other&quot; reasoning to
   hold, ALL participating operations must be seq_cst. Don't half-do it.
</code></pre>
<hr />
<h2 id="part-b-memory_order_consume-avoid-it">Part B: <code>memory_order_consume</code> (avoid it)</h2>
<h3 id="7-the-idea-dependency-ordered-before">7. The idea (dependency-ordered-before)</h3>
<p><code>consume</code> was meant to be a <em>cheaper acquire</em> for the common case where you only
need ordering along <strong>data dependencies</strong> (following a pointer you just loaded),
which some CPUs (notably ARM/POWER) provide for free.</p>
<pre><code class="language-cpp">std::atomic&lt;Node*&gt; head;

Node* p = head.load(std::memory_order_consume);  // intended: cheaper than acquire
int v = p-&gt;data;   // 'p-&gt;data' DEPENDS on p, so ordering was &quot;free&quot; on HW
</code></pre>
<pre><code>   Intended guarantee: only operations that DEPEND on the consumed value are
   ordered (via &quot;carries-a-dependency&quot;), not ALL later operations (as acquire
   does). Cheaper on weakly-ordered CPUs for pointer-chasing.
</code></pre>
<h3 id="8-why-it-failed">8. Why it failed</h3>
<pre><code>   * The &quot;dependency chain&quot; rules are extremely hard to specify and preserve
     through optimizers (a compiler can break a dependency, e.g. via 'p - p + q'
     or value speculation).
   * NO mainstream compiler actually implements consume as designed. They all
     silently PROMOTE it to acquire.
   * The standard (since C++17) explicitly discourages it; it's under active
     redesign ([[carries_dependency]] / std::kill_dependency were part of the
     failed machinery).
</code></pre>
<pre><code>   Reality today:
     memory_order_consume  ---(compiler)---&gt;  treated as memory_order_acquire
   You pay acquire cost anyway, plus you've written fragile, confusing code.
</code></pre>
<h3 id="9-what-to-do-instead">9. What to do instead</h3>
<pre><code>   * Use memory_order_acquire. It's correct, well-supported, and only marginally
     more expensive than consume would have been on the few CPUs that cared.
   * If you're doing pointer-publishing (the consume use case), acquire is the
     right tool (chapter 06 §4).
</code></pre>
<hr />
<h2 id="10-choosing-between-seq_cst-and-acquirerelease-recap">10. Choosing between seq_cst and acquire/release (recap)</h2>
<pre><code>   Need a single GLOBAL order across multiple atomics?      -&gt; seq_cst
   (mutual exclusion, &quot;at least one sees the other&quot;)

   Just publishing/consuming data via one flag/pointer?     -&gt; release/acquire
   (producer/consumer, ownership handoff, refcount)

   Only a standalone counter/flag value?                     -&gt; relaxed (ch 07)

   Considering consume?                                       -&gt; use acquire.

   Not sure?                                                  -&gt; seq_cst.
</code></pre>
<hr />
<h2 id="11-summary">11. Summary</h2>
<div class="diagram"><div class="diagram-title">seq_cst and consume summary</div><div class="dbox green"><div class="dbox-title">seq_cst</div><div class="dtext">acquire+release + <b>ONE</b> global total order S over all seq_cst ops. The <b>DEFAULT</b> and the safe choice</div><div class="dtext">Only order that forbids the Store-Buffer "both read 0" outcome. Needed for mutual-exclusion / "at least one sees the other" logic</div><div class="dtext">Cost: pricier stores (x86) / both sides (ARM)</div></div><div class="dbox red"><div class="dbox-title">consume</div><div class="dtext">A well-intentioned cheaper-acquire that no compiler implements (promoted to acquire), hard to use correctly, and discouraged. Just use <code>acquire</code></div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | seq_cst: acquire+release + ONE global total order S over all     |
 |   seq_cst ops. The DEFAULT and the safe choice. Only order that  |
 |   forbids the Store-Buffer "both read 0" outcome. Needed for     |
 |   mutual-exclusion / "at least one sees the other" logic.        |
 |   Cost: pricier stores (x86) / both sides (ARM).                |
 |                                                                  |
 | consume: a well-intentioned cheaper-acquire that no compiler     |
 |   implements (promoted to acquire), hard to use correctly, and   |
 |   discouraged. Just use acquire.                                |
 +------------------------------------------------------------------+</code></pre></details>
<p>Next: <a href="09-fences.md">09-fences.md</a>.</p>` },
  { name: `11. Fences`, path: `09-fences.md`, dir: ``, words: 877, mins: 4, body: `<h1 id="09--fences-stdatomic_thread_fence">09 — Fences (<code>std::atomic_thread_fence</code>)</h1>
<p>A <strong>fence</strong> (a.k.a. memory barrier) is a <em>standalone</em> ordering operation — it
constrains reordering without being attached to a particular atomic load/store.
Fences let you separate the &ldquo;atomic access&rdquo; from the &ldquo;ordering,&rdquo; which can be
more efficient and sometimes clearer.</p>
<p>Prereq: chapters 05–08.</p>
<hr />
<h2 id="1-operation-order-vs-standalone-fence">1. Operation-order vs standalone fence</h2>
<pre><code>   OPERATION ORDER (what we've used so far):
       x.store(1, memory_order_release);     // ordering rides ON the store

   STANDALONE FENCE:
       do_relaxed_writes();
       std::atomic_thread_fence(memory_order_release);  // a barrier by itself
       flag.store(1, memory_order_relaxed);             // relaxed store
</code></pre>
<pre><code>   A fence orders the operations AROUND it in the current thread, and can
   participate in synchronizes-with when paired with another fence or atomic.
   It is NOT tied to one variable -&gt; it can order MANY relaxed ops at once.
</code></pre>
<hr />
<h2 id="2-the-fence-flavors">2. The fence flavors</h2>
<pre><code class="language-cpp">std::atomic_thread_fence(std::memory_order_acquire);  // acquire fence
std::atomic_thread_fence(std::memory_order_release);  // release fence
std::atomic_thread_fence(std::memory_order_acq_rel);  // both
std::atomic_thread_fence(std::memory_order_seq_cst);  // full + global order
// (relaxed fence is a no-op)
</code></pre>
<pre><code>   RELEASE fence: no read/write BEFORE the fence can move AFTER any store that
                  follows it. Placed BEFORE a relaxed store to &quot;upgrade&quot; it.
   ACQUIRE fence: no read/write AFTER the fence can move BEFORE any load that
                  precedes it. Placed AFTER a relaxed load to &quot;upgrade&quot; it.
</code></pre>
<pre><code>   RELEASE fence layout:            ACQUIRE fence layout:
     ...prior reads/writes...          relaxed load(flag)
     atomic_thread_fence(release)      atomic_thread_fence(acquire)
     flag.store(v, relaxed)            ...subsequent reads/writes...
        (prior ops sealed below)          (subsequent ops sealed above)
</code></pre>
<hr />
<h2 id="3-fence-based-message-passing-equivalent-to-op-order">3. Fence-based message passing (equivalent to op-order)</h2>
<pre><code class="language-cpp">int data = 0;
std::atomic&lt;bool&gt; ready{false};

// Producer
data = 42;
std::atomic_thread_fence(std::memory_order_release);  // (F1)
ready.store(true, std::memory_order_relaxed);         // relaxed store

// Consumer
while (!ready.load(std::memory_order_relaxed)) {}     // relaxed load
std::atomic_thread_fence(std::memory_order_acquire);  // (F2)
use(data);                                            // safe
</code></pre>
<pre><code>   (F1) release fence + relaxed store   ~ behaves like   store(release)
   relaxed load + (F2) acquire fence    ~ behaves like   load(acquire)

   Synchronization: producer's release fence (before the store the consumer
   reads) synchronizes-with the consumer's acquire fence (after that load).
   =&gt; data=42 happens-before use(data). No race.
</code></pre>
<pre><code>   Producer                          Consumer
   data=42                           while(!ready.load(relaxed));
   ─fence(release)─┐                 ─fence(acquire)─┐
   ready.store(relaxed) ~~sync~~▶    use(data)  ◀────┘
</code></pre>
<p>Runnable: <a href="examples/ch09_fence.cpp"><code>examples/ch09_fence.cpp</code></a>.</p>
<hr />
<h2 id="4-why-use-a-fence-instead-of-an-ordered-op">4. Why use a fence instead of an ordered op?</h2>
<pre><code>   1. AMORTIZE ordering over many relaxed ops:
        write a[0..n] with relaxed stores;
        atomic_thread_fence(release);   // ONE barrier for all of them
        published.store(true, relaxed);
      vs. paying release on every store.

   2. Separate concerns: keep the atomic access relaxed (cheap) and place the
      barrier exactly where the algorithm needs it.

   3. Fence semantics are slightly STRONGER/broader than a single op's order,
      because they order ALL surrounding accesses, not just the one atomic.
</code></pre>
<pre><code>   Trade-off: fences are broader (order everything around them), so they can be
   LESS precise/more costly than a targeted ordered op in simple cases. Prefer
   ordered ops for single-variable handshakes; use fences for batch publishing.
</code></pre>
<hr />
<h2 id="5-the-seq_cst-fence">5. The <code>seq_cst</code> fence</h2>
<pre><code class="language-cpp">std::atomic_thread_fence(std::memory_order_seq_cst);
</code></pre>
<pre><code>   A seq_cst fence participates in the single global total order S (chapter 08)
   and provides a FULL barrier including StoreLoad. Classic use: fix the
   Store-Buffer litmus with relaxed atomics + fences:

   // Thread A                        // Thread B
   x.store(1, relaxed);               y.store(1, relaxed);
   atomic_thread_fence(seq_cst);      atomic_thread_fence(seq_cst);
   r1 = y.load(relaxed);              r2 = x.load(relaxed);
   -&gt; r1==0 &amp;&amp; r2==0 now IMPOSSIBLE (the seq_cst fences impose the global order).
</code></pre>
<hr />
<h2 id="6-signal_fence--compiler-only-barrier">6. <code>signal_fence</code> — compiler-only barrier</h2>
<pre><code class="language-cpp">std::atomic_signal_fence(std::memory_order_acquire);
</code></pre>
<pre><code>   atomic_signal_fence: orders operations between a thread and a SIGNAL HANDLER
   running IN THAT SAME THREAD. It's a COMPILER barrier only (no CPU fence),
   because a signal handler runs on the same core.
   Use for: lock-free communication with async-signal handlers. Rare.
   Do NOT use it for cross-thread ordering — it emits no hardware barrier.
</code></pre>
<hr />
<h2 id="7-fence-pairing-rules-summary">7. Fence pairing rules (summary)</h2>
<pre><code>   To establish happens-before with fences, you generally need:

   A) release fence (thread 1)  +  a relaxed store that a relaxed load reads
                                    +  acquire fence (thread 2)
        -&gt; fence(release) synchronizes-with fence(acquire)

   B) A release fence + an acquire OPERATION also pair; and a release OPERATION
      + an acquire fence pair. (Fences compose with ordered ops.)

   The atomic op in the middle carries the value; the fences carry the ordering.
</code></pre>
<hr />
<h2 id="8-practical-advice">8. Practical advice</h2>
<pre><code>   * Default to ORDERED OPERATIONS (store(release)/load(acquire)). They're
     easier to reason about and match the common patterns.
   * Reach for FENCES when: batching many relaxed ops behind one barrier, or
     implementing a primitive where separating access from ordering helps.
   * Use seq_cst fence when you need a full StoreLoad barrier / global order
     with otherwise-relaxed atomics.
   * atomic_signal_fence is ONLY for same-thread signal handlers.
   * Verify with TSan and, ideally, reasoning + weak-hardware testing.
</code></pre>
<hr />
<h2 id="9-summary">9. Summary</h2>
<div class="diagram"><div class="diagram-title">Fences summary</div><div class="dbox blue"><div class="dbox-title">Fence</div><div class="dtext">Standalone barrier; orders the ops around it, not tied to one variable</div><div class="dtext">release fence <b>BEFORE</b> a (relaxed) store ~ <code>store(release)</code></div><div class="dtext">acquire fence <b>AFTER</b> a (relaxed) load ~ <code>load(acquire)</code></div></div><div class="dbox teal"><div class="dbox-title">Synchronizes-with</div><div class="dtext">A release fence synchronizes-with an acquire fence via a relaxed store/load carrying the value</div></div><div class="dbox green"><div class="dbox-title">Variants</div><div class="dtext"><code>seq_cst</code> fence = full barrier + global order (fixes SB litmus)</div><div class="dtext"><code>atomic_signal_fence</code> = compiler-only, for same-thread signals</div></div><div class="dbox green"><div class="dbox-title">Guidance</div><div class="dtext">Prefer ordered ops; use fences to batch/upgrade relaxed ops</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+

<p><code>compare_exchange</code> (CAS = Compare-And-Swap) is the most powerful atomic
operation. Every lock-free algorithm is built on it. It&rsquo;s how you do
&ldquo;read-check-then-conditionally-write&rdquo; <strong>atomically</strong>, closing the check-then-act
race from chapter 00.</p>
<hr />
<h2 id="1-what-cas-does">1. What CAS does</h2>
<pre><code>   compare_exchange(expected, desired):
     atomically {
       if (*this == expected) { *this = desired; return true;  }
       else                   { expected = *this; return false; }
     }
   All of that happens as ONE indivisible step.
</code></pre>
<pre><code>   Note the side effect on FAILURE: 'expected' is UPDATED to the current value.
   This is what makes the CAS retry loop work (you get the fresh value for free).
</code></pre>
<pre><code class="language-cpp">std::atomic&lt;int&gt; a{10};
int expected = 10;
bool ok = a.compare_exchange_strong(expected, 20);
// if a was 10: a becomes 20, ok==true,  expected still 10
// if a was 15: a unchanged,   ok==false, expected updated to 15
</code></pre>
<hr />
<h2 id="2-weak-vs-strong">2. <code>weak</code> vs <code>strong</code></h2>
<pre><code class="language-cpp">a.compare_exchange_weak(expected, desired);
a.compare_exchange_strong(expected, desired);
</code></pre>
<pre><code>   STRONG: fails ONLY if *this != expected. No false failures.
   WEAK:   may fail SPURIOUSLY even when *this == expected (returns false
           without swapping), on some architectures (LL/SC based: ARM/POWER).

   Why weak exists: on LL/SC CPUs, weak maps to a single load-linked/store-
   conditional pair (cheaper); strong needs a loop to hide spurious failures.
</code></pre>
<pre><code>   Rule:
     * Inside a RETRY LOOP -&gt; use WEAK (you're looping anyway; spurious failure
       just loops once more; it's cheaper per iteration).
     * For a SINGLE one-shot attempt (no loop) -&gt; use STRONG (you don't want a
       spurious false).
</code></pre>
<hr />
<h2 id="3-the-cas-loop-the-fundamental-idiom">3. The CAS loop (the fundamental idiom)</h2>
<p>Most lock-free updates are &ldquo;read current, compute new, try to install; retry if
someone beat me&rdquo;:</p>
<pre><code class="language-cpp">std::atomic&lt;int&gt; value{0};

void atomic_multiply(int factor) {
    int current = value.load(std::memory_order_relaxed);
    int desired;
    do {
        desired = current * factor;                 // compute from snapshot
    } while (!value.compare_exchange_weak(current, desired,
                 std::memory_order_release,          // success order
                 std::memory_order_relaxed));        // failure order
    // On failure, 'current' was refreshed -&gt; recompute and retry.
}
</code></pre>
<pre><code>   +---------------------------------------------------------+
   | current = load()                                        |
   |   ┌──────────────────────────────────────────────┐     |
   |   │ desired = f(current)                          │     |
   |   │ CAS(current, desired) ?                        │     |
   |   │    success -&gt; done                            │     |
   |   │    failure -&gt; current now = latest; loop ─────┘     |
   +---------------------------------------------------------+
   Progress guarantee: at least one thread always succeeds each round
   (lock-free), because a failure means someone else made progress.
</code></pre>
<p>CAS can implement <strong>any</strong> RMW (even ones with no dedicated <code>fetch_*</code>), which is
why it&rsquo;s called universal.</p>
<hr />
<h2 id="4-the-two-memory-orders-of-cas">4. The two memory orders of CAS</h2>
<p><code>compare_exchange</code> takes <strong>two</strong> orders: one for success, one for failure.</p>
<pre><code class="language-cpp">bool compare_exchange_weak(T&amp; expected, T desired,
                           memory_order success,
                           memory_order failure);
</code></pre>
<pre><code>   success order: applied when the swap happens (it's an RMW -&gt; acquire/release/
                  acq_rel/seq_cst all valid).
   failure order: applied when it doesn't swap -&gt; it's just a LOAD, so only
                  relaxed/acquire/seq_cst are valid (NOT release/acq_rel).

   Common choices:
     success = acq_rel (or release), failure = relaxed   (typical CAS loop)
     success = acquire, failure = acquire                (when you read on fail)
</code></pre>
<pre><code>   Constraint: 'failure' must be no stronger than 'success', and cannot be
   release/acq_rel (a failed CAS performs no store, so it can't release).
</code></pre>
<p>Single-argument forms default both to <code>seq_cst</code>:</p>
<pre><code class="language-cpp">a.compare_exchange_strong(expected, desired);   // both seq_cst
</code></pre>
<hr />
<h2 id="5-worked-example-lock-free-stack-push">5. Worked example: lock-free stack push</h2>
<pre><code class="language-cpp">struct Node { int value; Node* next; };
std::atomic&lt;Node*&gt; head{nullptr};

void push(int v) {
    Node* n = new Node{v, nullptr};
    n-&gt;next = head.load(std::memory_order_relaxed);
    while (!head.compare_exchange_weak(n-&gt;next, n,
               std::memory_order_release,     // publish n (and n-&gt;next writes)
               std::memory_order_relaxed)) {  // on fail, n-&gt;next refreshed
        // n-&gt;next was updated to the current head by the failed CAS; retry.
    }
}
</code></pre>
<pre><code>   Thread A: n-&gt;next = head(=X);  CAS(head: X-&gt;n)
   If B pushed between load and CAS, head != X:
      CAS fails, sets n-&gt;next = head(new value), loop retries.
   Eventually CAS succeeds -&gt; head points to n, n-&gt;next chains correctly.

        head ──▶ X ──▶ ...          becomes         head ──▶ n ──▶ X ──▶ ...
</code></pre>
<p>Release order publishes the fully-built node; a popping thread uses acquire.
Full stack (with the ABA caveat below) in chapter 11.</p>
<hr />
<h2 id="6-the-aba-problem-cass-classic-trap">6. The ABA problem (CAS&rsquo;s classic trap)</h2>
<p>CAS checks <em>value equality</em>, not &ldquo;did it change.&rdquo; If a value goes A -&gt; B -&gt; A
between your load and your CAS, the CAS <strong>succeeds</strong> as if nothing changed — but
the world did change. This corrupts pointer-based structures.</p>
<pre><code>   Lock-free stack pop, thread 1:
     old_head = head (points to node A, A-&gt;next = B)
     ... PREEMPTED ...
   Thread 2: pop A, pop B, push A again (reusing A's address)
             now head = A, but A-&gt;next is stale/freed!
   Thread 1 resumes:
     CAS(head: A -&gt; A-&gt;next(=B))   // A is back, so CAS SUCCEEDS
     -&gt; head now points to B, which was FREED. Corruption / use-after-free.
</code></pre>
<pre><code>   Time:   head=A(-&gt;B)   [T1 read A]   [T2: pop A, pop B, free B, push A]
           head=A(-&gt;?)   [T1 CAS A-&gt;B] &lt;-- B is gone! ABA struck.
</code></pre>
<h3 id="fixes-for-aba">Fixes for ABA</h3>
<pre><code>   1. Tagged pointers / version counter: CAS a {pointer, counter} pair; bump the
      counter on every change so A-with-tag-1 != A-with-tag-2.
      (needs double-width CAS: compare_exchange on a 128-bit struct, or packed
       pointer+tag in 64 bits.)
   2. Hazard pointers: readers publish which nodes they're using; reclamation
      waits until no hazard points to a node (chapter 11).
   3. RCU / epoch-based reclamation: defer freeing until no reader can hold a
      reference.
   4. Don't reuse memory quickly (e.g. use a GC or a freelist with tags).
</code></pre>
<pre><code class="language-cpp">// Sketch of a tagged pointer to defeat ABA:
struct TaggedPtr { Node* ptr; std::uintptr_t tag; };   // 16 bytes
std::atomic&lt;TaggedPtr&gt; head;   // may or may not be lock-free (check!)
// each successful update does {ptr=new, tag=old.tag+1}
</code></pre>
<p>ABA is <em>the</em> reason &ldquo;I wrote a lock-free stack in an afternoon&rdquo; code is usually
broken. Respect it.</p>
<hr />
<h2 id="7-building-fetch_max-something-with-no-built-in">7. Building <code>fetch_max</code> (something with no built-in)</h2>
<p>CAS lets you implement atomic operations the standard doesn&rsquo;t provide:</p>
<pre><code class="language-cpp">int atomic_fetch_max(std::atomic&lt;int&gt;&amp; a, int v) {
    int cur = a.load(std::memory_order_relaxed);
    while (v &gt; cur &amp;&amp;
           !a.compare_exchange_weak(cur, v,
                std::memory_order_relaxed)) {
        // cur refreshed on failure; loop condition re-checks v &gt; cur
    }
    return cur;
}
</code></pre>
<pre><code>   Keeps trying to raise 'a' to v, but only if v is larger. If another thread
   raised it past v meanwhile, 'v &gt; cur' becomes false and we stop.
</code></pre>
<p>Runnable: <a href="examples/ch10_cas_stack.cpp"><code>examples/ch10_cas_stack.cpp</code></a>,
<a href="examples/ch10_fetch_max.cpp"><code>examples/ch10_fetch_max.cpp</code></a>.</p>
<hr />
<h2 id="8-summary">8. Summary</h2>
<div class="diagram"><div class="diagram-title">Compare-exchange summary</div><div class="dbox blue"><div class="dbox-title">CAS</div><div class="dtext">Atomically "if value==expected, set desired; else load into expected." Returns success bool. The universal RMW primitive</div></div><div class="dbox teal"><div class="dbox-title">weak vs strong</div><div class="dtext"><b>weak</b>: may fail spuriously -&gt; use in <b>LOOPS</b> (cheaper)</div><div class="dtext"><b>strong</b>: no spurious fail -&gt; use for <b>SINGLE</b> attempts</div></div><div class="dbox green"><div class="dbox-title">CAS loop</div><div class="dtext">Two orders: success (RMW) + failure (load; &lt;= success, no release)</div><div class="dtext">load -&gt; compute -&gt; CAS(weak); retry on fail (expected auto-refreshed). Lock-free progress guaranteed</div></div><div class="dbox red"><div class="dbox-title">ABA problem</div><div class="dtext">Value returns to A after A-&gt;B-&gt;A; CAS wrongly succeeds. Fix with tagged pointers / hazard pointers / RCU</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+
 | CAS: atomically "if value==expected, set desired; else load into  |
 | expected." Returns success bool. The universal RMW primitive.    |
 |                                                                  |
 | weak: may fail spuriously -&gt; use in LOOPS (cheaper).            |
 | strong: no spurious fail -&gt; use for SINGLE attempts.            |
 | Two orders: success (RMW) + failure (load; &lt;= success, no release).|
 | CAS loop: load -&gt; compute -&gt; CAS(weak); retry on fail (expected  |

<p>Putting it together: real lock-free structures, their memory ordering, and the
hard parts (memory reclamation, ABA, progress guarantees). This chapter is where
atomics get genuinely difficult — the goal is to give you correct, minimal
examples and, crucially, an honest sense of the pitfalls.</p>
<blockquote>
<p><strong>Reality check:</strong> writing correct, production lock-free structures is expert
work. Prefer battle-tested libraries (e.g. <code>boost::lockfree</code>, <code>folly</code>, <code>moodycamel</code>).
Learn the mechanics here so you can read them and know when a mutex is better.</p>
</blockquote>
<hr />
<h2 id="1-progress-guarantees-the-taxonomy">1. Progress guarantees (the taxonomy)</h2>
<pre><code>   BLOCKING        : a stalled thread can block others indefinitely (mutex).
   OBSTRUCTION-FREE : a thread makes progress if it runs alone (weakest non-block).
   LOCK-FREE       : SOME thread always makes progress system-wide (no livelock),
                     but individual threads may starve. (CAS loops give this.)
   WAIT-FREE       : EVERY thread makes progress in bounded steps. (Hardest.)
</code></pre>
<pre><code>   Guarantee strength:  blocking &lt; obstruction-free &lt; lock-free &lt; wait-free
   &quot;Lock-free&quot; does NOT mean &quot;no loops&quot; or &quot;always fast.&quot; It means the system
   as a whole can't be stuck because one thread was paused (no held locks).
</code></pre>
<hr />
<h2 id="2-spsc-ring-buffer-single-producer-single-consumer">2. SPSC ring buffer (single-producer, single-consumer)</h2>
<p>The <strong>easiest</strong> and most useful lock-free queue. One thread pushes, one pops. No
CAS needed — just acquire/release on two indices.</p>
<pre><code class="language-cpp">#include &lt;atomic&gt;
#include &lt;vector&gt;
#include &lt;optional&gt;

template &lt;class T&gt;
class SpscQueue {
    std::vector&lt;T&gt; buf_;
    const std::size_t cap_;
    std::atomic&lt;std::size_t&gt; head_{0};   // read index  (consumer writes)
    std::atomic&lt;std::size_t&gt; tail_{0};   // write index (producer writes)
public:
    explicit SpscQueue(std::size_t cap) : buf_(cap + 1), cap_(cap + 1) {}

    bool push(const T&amp; item) {                       // producer only
        const auto tail = tail_.load(std::memory_order_relaxed);
        const auto next = (tail + 1) % cap_;
        if (next == head_.load(std::memory_order_acquire))
            return false;                            // full
        buf_[tail] = item;                           // write payload
        tail_.store(next, std::memory_order_release);// publish
        return true;
    }

    std::optional&lt;T&gt; pop() {                          // consumer only
        const auto head = head_.load(std::memory_order_relaxed);
        if (head == tail_.load(std::memory_order_acquire))
            return std::nullopt;                     // empty
        T item = buf_[head];                          // read payload
        head_.store((head + 1) % cap_, std::memory_order_release);
        return item;
    }
};
</code></pre>
<pre><code>   Ring buffer (cap+1 slots; one slot kept empty to distinguish full/empty):

        head_                tail_
          v                    v
        [ _ ][ A ][ B ][ C ][ _ ][ _ ]
              ^^^^^^^^^^^^^ occupied ^
   producer advances tail_ (release) after writing buf_[tail].
   consumer sees new tail_ (acquire) -&gt; the payload write is visible. No race.
   empty:  head_ == tail_        full: (tail_+1)%cap == head_
</code></pre>
<pre><code>   Why no CAS: only ONE producer touches tail_, only ONE consumer touches head_.
   Each index has a single writer -&gt; plain load/store with acquire/release
   suffices. This is why SPSC is the go-to lock-free queue: simple AND fast.
</code></pre>
<p>Runnable: <a href="examples/ch11_spsc_queue.cpp"><code>examples/ch11_spsc_queue.cpp</code></a>.</p>
<hr />
<h2 id="3-lock-free-stack-treiber-stack-with-cas">3. Lock-free stack (Treiber stack) with CAS</h2>
<p>Multiple producers/consumers. Uses the CAS loop from chapter 10. Correct for
<strong>push</strong>; <strong>pop</strong> has the ABA/reclamation problem.</p>
<pre><code class="language-cpp">template &lt;class T&gt;
class LockFreeStack {
    struct Node { T value; Node* next; };
    std::atomic&lt;Node*&gt; head_{nullptr};
public:
    void push(T v) {
        Node* n = new Node{std::move(v), head_.load(std::memory_order_relaxed)};
        while (!head_.compare_exchange_weak(n-&gt;next, n,
                   std::memory_order_release,
                   std::memory_order_relaxed)) {}
    }

    bool pop(T&amp; out) {
        Node* old = head_.load(std::memory_order_acquire);
        while (old &amp;&amp;
               !head_.compare_exchange_weak(old, old-&gt;next,
                   std::memory_order_acquire,
                   std::memory_order_relaxed)) {}
        if (!old) return false;
        out = std::move(old-&gt;value);
        // delete old;   // &lt;-- DANGER: another thread may still be reading 'old'
                          //     (ABA / use-after-free). See reclamation below.
        return true;
    }
};
</code></pre>
<pre><code>   push:  build node, CAS head: old_head -&gt; new_node (release publishes node).
   pop:   read head, CAS head -&gt; head-&gt;next (acquire to see node contents).

   THE HARD PART: when is it safe to \`delete old\`? Another thread that loaded
   'old' just before you popped may dereference old-&gt;next AFTER you free it.
   Naive delete -&gt; use-after-free + ABA (chapter 10 §6).
</code></pre>
<hr />
<h2 id="4-memory-reclamation--the-real-difficulty">4. Memory reclamation — the real difficulty</h2>
<p>&ldquo;How do I free a node when I can&rsquo;t be sure no one is reading it?&rdquo; Three standard
answers:</p>
<pre><code>   1. HAZARD POINTERS
      Each thread publishes (in a shared array) the pointers it's currently
      dereferencing (&quot;hazards&quot;). Before freeing a node, a reclaimer scans all
      hazard pointers; if none match, it's safe to delete; otherwise defer.

        thread's hazard slot:  [ ptr it is reading ]
        reclaimer: &quot;is 'old' in ANY hazard slot? if yes -&gt; retire list, retry
                    later; if no -&gt; delete.&quot;

   2. EPOCH-BASED RECLAMATION (EBR) / RCU
      Global epoch counter; threads announce entry/exit of critical regions.
      Retired nodes are freed only after all threads have passed the epoch in
      which the node was unlinked (no reader could still hold it).

   3. REFERENCE COUNTING (atomic&lt;shared_ptr&gt;)
      Let a lock-free-ish atomic shared_ptr manage lifetime (chapter 13).
      Simpler to write; usually slower; may not be lock-free.
</code></pre>
<pre><code>   Rule of thumb: if you find yourself needing hazard pointers / EBR, strongly
   consider whether a mutex-protected structure or an existing library is the
   better engineering choice. Reclamation is where lock-free bugs hide.
</code></pre>
<p>C++26 is adding <strong>standard hazard pointers (<code>std::hazard_pointer</code>)</strong> and <strong>RCU
(<code>std::rcu_domain</code>)</strong> to the library — see chapter 13 — precisely because rolling
your own is so error-prone.</p>
<hr />
<h2 id="5-mpmc-queues-multi-producer-multi-consumer">5. MPMC queues (multi-producer, multi-consumer)</h2>
<p>The general case is genuinely hard. The well-known correct design is the
<strong>Michael-Scott queue</strong> (linked list, CAS on head and tail with helping) and the
<strong>bounded array queue with per-slot sequence numbers</strong> (Vyukov). Both are subtle.</p>
<pre><code>   Michael-Scott (sketch):
     enqueue: CAS tail-&gt;next = new node, then CAS tail = new node (&quot;swing tail&quot;).
              Other threads &quot;help&quot; swing a lagging tail.
     dequeue: read head, help-advance tail if needed, CAS head = head-&gt;next.
     + a dummy head node to simplify empty/one-element cases.
     + reclamation scheme for freed nodes (hazard pointers / EBR).
</code></pre>
<pre><code>   Recommendation: DO NOT hand-write an MPMC queue for production. Use:
     * moodycamel::ConcurrentQueue (fast, well-tested)
     * boost::lockfree::queue
     * folly::MPMCQueue
   Understand the design; don't reinvent the reclamation.
</code></pre>
<hr />
<h2 id="6-false-sharing-a-performance-killer-chapter-12-too">6. False sharing (a performance killer, chapter 12 too)</h2>
<p>Even correct lock-free code can be slow if independent atomics share a cache
line. In the SPSC queue, put <code>head_</code> and <code>tail_</code> on <strong>separate cache lines</strong>:</p>
<pre><code class="language-cpp">#include &lt;new&gt;   // std::hardware_destructive_interference_size

struct alignas(std::hardware_destructive_interference_size) PaddedIndex {
    std::atomic&lt;std::size_t&gt; v{0};
};
PaddedIndex head_, tail_;   // producer &amp; consumer no longer fight over one line
</code></pre>
<pre><code>   Without padding:                    With padding:
   line: [ head_ | tail_ | ... ]       line1: [ head_ | pad... ]
         producer &amp; consumer            line2: [ tail_ | pad... ]
         invalidate each other          -&gt; independent -&gt; much faster
</code></pre>
<hr />
<h2 id="7-choosing-lock-free-vs-mutex-be-honest">7. Choosing: lock-free vs mutex (be honest)</h2>
<pre><code>   Prefer a MUTEX (or std::queue + lock) unless:
     * profiling shows the lock is a real bottleneck, AND
     * the critical section is tiny, AND
     * you (or a library) can implement reclamation correctly.

   Lock-free wins for: very high contention on tiny ops, real-time/signal-safe
   contexts (no blocking), avoiding priority inversion.
   Lock-free costs: extreme difficulty, ABA/reclamation, hard-to-reproduce bugs,
     and often NOT faster under low/moderate contention.
</code></pre>
