<p>A field guide of ready-to-use atomic patterns (spinlock, one-shot flag,
double-checked init, seqlock) and the traps that bite everyone (false sharing,
volatile confusion, non-atomic composite ops).</p>
<hr />
<h2 id="1-pattern-stop-flag--one-shot-signal">1. Pattern: stop flag / one-shot signal</h2>
<p>The simplest correct atomic pattern. A worker polls a flag another thread sets.</p>
<pre><code class="language-cpp">std::atomic&lt;bool&gt; stop{false};

// worker
while (!stop.load(std::memory_order_acquire)) {
    do_chunk();
}

// controller
stop.store(true, std::memory_order_release);
</code></pre>
<pre><code>   acquire on the load / release on the store so that any data the controller
   set BEFORE requesting stop is visible to the worker after it observes stop.
   (If the flag guards no other data, relaxed would technically do — but acquire/
    release is the safe habit and near-free.)
</code></pre>
<p>C++20: use <code>stop.wait(false)</code> + <code>stop.notify_all()</code> to avoid busy-polling, or
better, <code>std::stop_token</code>/<code>std::jthread</code> for cancellation (chapter 13).</p>
<hr />
<h2 id="2-pattern-spinlock-built-from-atomic_flag">2. Pattern: spinlock (built from atomic_flag)</h2>
<p>A minimal mutual-exclusion lock for <em>very short</em> critical sections.</p>
<pre><code class="language-cpp">#include &lt;atomic&gt;
#include &lt;thread&gt;

class SpinLock {
    std::atomic_flag flag_ = ATOMIC_FLAG_INIT;   // C++20: = {} works too
public:
    void lock() {
        while (flag_.test_and_set(std::memory_order_acquire)) {
            // optional: reduce contention while spinning
            #if defined(__cpp_lib_atomic_flag_test)
            while (flag_.test(std::memory_order_relaxed))   // C++20 read-only spin
            #endif
                std::this_thread::yield();                   // or _mm_pause()
        }
    }
    void unlock() {
        flag_.clear(std::memory_order_release);
    }
};
</code></pre>
<pre><code>   test_and_set: atomically set true, return OLD value.
     old==false -&gt; we acquired the lock (loop exits).
     old==true  -&gt; someone holds it -&gt; spin.
   acquire on lock / release on unlock = the critical-section handshake.

   The inner &quot;test() then yield&quot; spin (&quot;test-and-test-and-set&quot;) avoids hammering
   the cache line with writes while waiting -&gt; less coherence traffic.
</code></pre>
<pre><code>   WARNING: spinlocks burn CPU and can cause priority inversion / livelock. Use
   ONLY for critical sections of a few instructions with low contention. When in
   doubt, use std::mutex (it spins briefly then sleeps — best of both).
</code></pre>
<p>Runnable: <a href="examples/ch12_spinlock.cpp"><code>examples/ch12_spinlock.cpp</code></a>.</p>
<hr />
<h2 id="3-pattern-double-checked-locking--lazy-init">3. Pattern: double-checked locking / lazy init</h2>
<p>Initialize a shared resource once, cheaply, on first use.</p>
<pre><code class="language-cpp">std::atomic&lt;Widget*&gt; instance{nullptr};
std::mutex init_mutex;

Widget* get() {
    Widget* p = instance.load(std::memory_order_acquire);   // fast path
    if (!p) {                                                // maybe uninit
        std::lock_guard&lt;std::mutex&gt; lock(init_mutex);
        p = instance.load(std::memory_order_relaxed);        // re-check
        if (!p) {
            p = new Widget();                                // construct
            instance.store(p, std::memory_order_release);    // publish
        }
    }
    return p;
}
</code></pre>
<pre><code>   Fast path: one acquire load, no lock, when already initialized.
   Slow path: lock, double-check, construct, release-publish.
   The acquire/release ensures the constructed Widget is fully visible to any
   thread that sees the non-null pointer (no half-constructed object).
</code></pre>
<pre><code>   BUT: prefer the language features that do this for you correctly:
     * static local: &quot;Meyers singleton&quot; is thread-safe since C++11.
         Widget&amp; get() { static Widget w; return w; }   // simplest &amp; correct
     * std::call_once + std::once_flag for non-static one-time init.
   Hand-rolled double-checked locking is a classic source of subtle bugs; use
   it only when the standard tools don't fit.
</code></pre>
<hr />
<h2 id="4-pattern-seqlock-fast-reads-of-a-small-struct">4. Pattern: seqlock (fast reads of a small struct)</h2>
<p>For data written rarely and read often (e.g. a timestamp/config), a <em>seqlock</em>
lets readers proceed without locking, retrying if a write intervened.</p>
<pre><code class="language-cpp">std::atomic&lt;unsigned&gt; seq{0};
Data data;   // small POD

// writer (single writer, or externally serialized):
void write(const Data&amp; d) {
    seq.fetch_add(1, std::memory_order_release);   // odd -&gt; &quot;write in progress&quot;
    data = d;                                       // non-atomic write
    seq.fetch_add(1, std::memory_order_release);   // even -&gt; &quot;done&quot;
}

// reader (lock-free, may retry):
Data read() {
    unsigned s1, s2; Data local;
    do {
        s1 = seq.load(std::memory_order_acquire);
        if (s1 &amp; 1) continue;                       // writer active -&gt; retry
        local = data;                               // tentative read
        s2 = seq.load(std::memory_order_acquire);
    } while (s1 != s2);                             // changed mid-read -&gt; retry
    return local;
}
</code></pre>
<pre><code>   seq even  = stable;  seq odd = write in progress.
   Reader accepts the read only if seq was even AND unchanged across the read.

   Timeline:  seq=2 [reader copies] seq=2  -&gt; accept
              seq=2 [reader copies] seq=4  -&gt; retry (writer ran)
   Great for many-readers/rare-writer of a small value. (Technically the plain
   'data' read races with the writer per the standard; in practice used with
   atomics/relaxed per field or is a known low-level idiom — for strict
   correctness use per-field atomics or std::atomic&lt;Data&gt; if trivially copyable.)
</code></pre>
<hr />
<h2 id="5-pitfall-false-sharing-padding--alignment">5. Pitfall: false sharing (padding &amp; alignment)</h2>
<p>Independent atomics on the same 64-byte cache line ping-pong between cores.</p>
<pre><code class="language-cpp">#include &lt;new&gt;

// BAD: both counters share a line -&gt; cores fight
struct Bad { std::atomic&lt;long&gt; a{0}; std::atomic&lt;long&gt; b{0}; };

// GOOD: each on its own line
struct Good {
    alignas(std::hardware_destructive_interference_size) std::atomic&lt;long&gt; a{0};
    alignas(std::hardware_destructive_interference_size) std::atomic&lt;long&gt; b{0};
};
</code></pre>
<pre><code>   hardware_destructive_interference_size ~ 64 (or 128) bytes: the minimum
   alignment to keep two objects OFF the same cache line.
   Also: hardware_CONSTRUCTIVE_interference_size = max size to keep things
   TOGETHER on one line (for data you WANT shared).
</code></pre>
<pre><code>   Symptom: a multithreaded counter that gets SLOWER with more threads.
   Diagnosis: perf shows cache-line bouncing (HITM). Fix: pad/align.
</code></pre>
<p>Runnable: <a href="examples/ch12_false_sharing.cpp"><code>examples/ch12_false_sharing.cpp</code></a>
(measures the slowdown).</p>
<hr />
<h2 id="6-pitfall-volatile-is-not-for-threading">6. Pitfall: <code>volatile</code> is NOT for threading</h2>
<pre><code>   volatile in C++ means &quot;this memory may change outside the program's control&quot;
   (memory-mapped I/O, signal handlers). It does NOT provide:
     * atomicity
     * cross-thread ordering / happens-before
     * visibility guarantees between threads
   Using 'volatile int' for thread communication is a BUG (works by accident on
   some compilers/x86, breaks on ARM / with optimization).

   Use std::atomic for threads. Use volatile ONLY for hardware registers / signal
   flags (and even then prefer std::atomic&lt;T&gt; with appropriate use).
</code></pre>
<pre><code>   volatile bool stop;   // WRONG for threads (no ordering/atomicity guarantee)
   std::atomic&lt;bool&gt; stop;// RIGHT
</code></pre>
<hr />
<h2 id="7-pitfall-composite-ops-arent-atomic">7. Pitfall: composite ops aren&rsquo;t atomic</h2>
<pre><code class="language-cpp">std::atomic&lt;int&gt; a{0};
a = a + 1;                 // TWO ops: load then store -&gt; lost updates
if (a &gt; 0) a--;            // check-then-act race
int x = a; int y = a;      // x and y may differ (two loads)
</code></pre>
<pre><code>   ATOMIC means each individual load/store/RMW is indivisible. Combining them is
   NOT. Use a single RMW (++a, fetch_add) or a CAS loop (chapter 10), or a mutex
   for multi-step invariants.
</code></pre>
<hr />
<h2 id="8-pitfall-forgetting-the-memory-order-arguments-default-is-seq_cst">8. Pitfall: forgetting the memory order argument&rsquo;s default is seq_cst</h2>
<pre><code>   a.store(1);              // seq_cst (safe, maybe slower than you think)
   a.store(1, relaxed);     // explicit, cheaper — but only if correct

   Not a bug per se, but people assume &quot;atomic == fast.&quot; A hot seq_cst store on
   ARM is a full barrier. Know your defaults; profile before weakening.
</code></pre>
<hr />
<h2 id="9-pitfall-mixing-atomic-and-non-atomic-access-to-the-same-object">9. Pitfall: mixing atomic and non-atomic access to the same object</h2>
<pre><code>   Accessing the same object atomically in one place and non-atomically in
   another (without synchronization) is UB. Either it's always atomic, or the
   non-atomic accesses are fully ordered by other synchronization.
   (std::atomic_ref, chapter 13, exists precisely to atomically access an object
   that is otherwise plain — but ALL concurrent accesses must go through the ref.)
</code></pre>
<hr />
<h2 id="10-quick-pattern-selector">10. Quick pattern selector</h2>
<pre><code>   Need                                  Use
   -----------------------------------   ---------------------------------
   cancel/stop a worker                  atomic&lt;bool&gt; flag / std::stop_token
   count events                          atomic&lt;int&gt; fetch_add(relaxed)
   one-time init                         static local / std::call_once
   short critical section, low contention spinlock (or just std::mutex)
   publish a built object                atomic&lt;T*&gt; store(release)/load(acquire)
   many readers, rare small writes       seqlock (carefully) / atomic&lt;T&gt;
   multi-step invariant                  mutex (simplest &amp; correct)
   avoid contention on separate counters alignas(64) padding (false sharing)
</code></pre>
<hr />
<h2 id="11-summary">11. Summary</h2>
<div class="diagram"><div class="diagram-title">Patterns and pitfalls summary</div><div class="dbox green"><div class="dbox-title">Patterns</div><div class="dtext">Stop flag, spinlock (<code>atomic_flag</code> <code>test_and_set</code>), double-checked init (prefer static local / <code>call_once</code>), seqlock</div></div><div class="dbox red"><div class="dbox-title">Pitfalls</div><div class="dtext">false sharing -&gt; <code>alignas(hardware_destructive_...)</code></div><div class="dtext"><code>volatile</code> is <b>NOT</b> threading -&gt; use <code>std::atomic</code></div><div class="dtext"><code>a=a+1</code> / check-then-act are <b>NOT</b> atomic -&gt; RMW or CAS or mutex</div><div class="dtext">default order is <code>seq_cst</code> (fine, but know the cost)</div><div class="dtext">never mix atomic &amp; non-atomic access to one object</div></div></div><details class="ascii-diagram"><summary>Details</summary><pre><code> +------------------------------------------------------------------+

<p>Modern C++ added major atomic capabilities. C++20 was huge (<code>wait</code>/<code>notify</code>,
<code>atomic_ref</code>, <code>atomic&lt;shared_ptr&gt;</code>, <code>atomic&lt;floating&gt;</code>). C++23/26 continue with
reclamation primitives and more. This chapter surveys them with examples.</p>
<hr />
<h2 id="1-c20-wait--notify--efficient-blocking-on-atomics">1. C++20: <code>wait</code> / <code>notify</code> — efficient blocking on atomics</h2>
<p>Before C++20, waiting for an atomic to change meant a busy-spin. C++20 adds
futex-style blocking directly on atomics.</p>
<pre><code class="language-cpp">std::atomic&lt;int&gt; state{0};

// Waiter: blocks (OS sleep) while state == 0, wakes when it changes.
state.wait(0, std::memory_order_acquire);   // &quot;wait while value == 0&quot;

// Notifier:
state.store(1, std::memory_order_release);
state.notify_one();    // wake one waiter
// state.notify_all(); // wake all waiters
</code></pre>
<pre><code>   .wait(old, order): if value == old, block until notified AND value != old.
                      (spurious wakeups handled internally; it re-checks.)
   .notify_one() / .notify_all(): wake waiter(s). Call AFTER the store.

   Beats spinning: the OS parks the thread (no CPU burn) and wakes it on notify.
</code></pre>
<pre><code>   Producer                         Consumer
   ...produce...                    ready.wait(false, acquire);  // sleeps
   ready.store(true, release);      // (wakes here)
   ready.notify_one();      ─────▶  use(data);
</code></pre>
<p>Works on <code>atomic&lt;T&gt;</code> and <code>atomic_flag</code> (<code>flag.wait(false)</code>, <code>flag.notify_one()</code>).</p>
<p>Runnable: <a href="examples/ch13_wait_notify.cpp"><code>examples/ch13_wait_notify.cpp</code></a>.</p>
<hr />
<h2 id="2-c20-stdatomic_reft--atomic-access-to-a-non-atomic-object">2. C++20: <code>std::atomic_ref&lt;T&gt;</code> — atomic access to a NON-atomic object</h2>
<p>Sometimes you have a plain object (or an array element) and want <em>some</em> accesses
to be atomic without changing its type. <code>atomic_ref</code> provides atomic operations
over existing storage.</p>
<pre><code class="language-cpp">#include &lt;atomic&gt;

void parallel_add(int* data, std::size_t n, int idx_shared) {
    // Suppose many threads increment data[idx_shared]:
    std::atomic_ref&lt;int&gt; ref(data[idx_shared]);   // atomic view over an int
    ref.fetch_add(1, std::memory_order_relaxed);  // atomic RMW on plain int
}
</code></pre>
<pre><code>   atomic_ref&lt;T&gt; wraps an EXISTING T object and gives it load/store/RMW/CAS.
   Requirements &amp; rules:
     * The referenced object must be suitably ALIGNED (check
       atomic_ref&lt;T&gt;::required_alignment) to be lock-free.
     * While ANY atomic_ref to an object exists, ALL accesses to that object
       (by any thread) must go through atomic_ref — no plain access. Otherwise UB.
     * Great for: atomically updating elements of a big array/struct you can't
       (or don't want to) declare as atomic&lt;T&gt;[].
</code></pre>
<pre><code>   std::atomic&lt;int&gt; arr[N];   // every element always atomic (heavier type)
        vs.
   int arr[N]; ... std::atomic_ref&lt;int&gt;(arr[i]).fetch_add(1);  // opt-in atomicity
</code></pre>
<p>Runnable: <a href="examples/ch13_atomic_ref.cpp"><code>examples/ch13_atomic_ref.cpp</code></a>.</p>
<hr />
<h2 id="3-c20-stdatomicstdshared_ptrt-and-weak_ptr">3. C++20: <code>std::atomic&lt;std::shared_ptr&lt;T&gt;&gt;</code> and <code>weak_ptr</code></h2>
<p>The old free functions <code>std::atomic_load(&amp;sp)</code> / <code>atomic_store(&amp;sp, ...)</code> on
<code>shared_ptr</code> were clunky and error-prone. C++20 provides a proper
<code>atomic&lt;shared_ptr&lt;T&gt;&gt;</code> specialization — the easiest correct path to lock-free-ish
shared data structures with automatic reclamation.</p>
<pre><code class="language-cpp">#include &lt;atomic&gt;
#include &lt;memory&gt;

std::atomic&lt;std::shared_ptr&lt;Config&gt;&gt; current_config;

// Reader (never sees a torn/half-freed object):
void use_config() {
    std::shared_ptr&lt;Config&gt; cfg = current_config.load();   // atomic, refcounted
    if (cfg) cfg-&gt;apply();                                  // safe to use
}

// Writer (atomic swap; old config freed when last reader drops it):
void update_config(std::shared_ptr&lt;Config&gt; new_cfg) {
    current_config.store(std::move(new_cfg));
    // or: current_config.compare_exchange_strong(expected, desired);
}
</code></pre>
<pre><code>   This solves the RECLAMATION problem (chapter 11) for you: the shared_ptr
   refcount ensures the old Config isn't freed until every reader that loaded it
   has released it. No hazard pointers, no ABA on the object.

   Caveat: atomic&lt;shared_ptr&gt; may NOT be lock-free (often uses a lock/split-ref
   internally). Check is_lock_free(). It's correct and convenient, not always
   the fastest. Perfect for read-mostly config/state swapping.
</code></pre>
<p>This is the recommended pattern for &ldquo;swap out a whole immutable data structure
atomically&rdquo; (copy-on-write config, routing tables, etc.).</p>
<hr />
<h2 id="4-c20-atomic-arithmetic-on-floating-point--better-atomic_flag">4. C++20: atomic arithmetic on floating point &amp; better <code>atomic_flag</code></h2>
<pre><code class="language-cpp">std::atomic&lt;double&gt; sum{0.0};
sum.fetch_add(1.5, std::memory_order_relaxed);   // C++20: atomic float add

std::atomic_flag f{};        // C++20: default-initialized to clear (false)
bool v = f.test();           // C++20: read WITHOUT setting (new)
f.wait(false);               // C++20: wait/notify on atomic_flag
f.notify_one();
</code></pre>
<pre><code>   Pre-C++20: atomic_flag had ONLY test_and_set / clear (no way to just read).
   C++20 adds test(), wait(), notify_* -&gt; atomic_flag is now a usable primitive.
</code></pre>
<hr />
<h2 id="5-c20-stdatomictis_always_lock_free--version-macros">5. C++20: <code>std::atomic&lt;T&gt;::is_always_lock_free</code> &amp; <code>&lt;version&gt;</code> macros</h2>
<p>Already covered in chapter 03. Plus feature-test macros:</p>
<pre><code class="language-cpp">#include &lt;version&gt;
#if defined(__cpp_lib_atomic_wait)         // wait/notify available
#endif
#if defined(__cpp_lib_atomic_ref)          // atomic_ref available
#endif
#if defined(__cpp_lib_atomic_shared_ptr)   // atomic&lt;shared_ptr&gt; available
#endif
</code></pre>
<hr />
<h2 id="6-c20-adjacent-stdlatch-stdbarrier-stdcounting_semaphore">6. C++20 (adjacent): <code>std::latch</code>, <code>std::barrier</code>, <code>std::counting_semaphore</code></h2>
<p>Not atomics per se, but atomic-based higher-level sync you should prefer over
hand-rolled atomic coordination:</p>
<pre><code class="language-cpp">#include &lt;latch&gt;
#include &lt;barrier&gt;
#include &lt;semaphore&gt;

std::latch start_gate{1};       // one-shot countdown; threads wait() then it opens
std::barrier sync_point{N};     // reusable: N threads arrive_and_wait() each phase
std::counting_semaphore&lt;&gt; sem{3}; // permits: acquire()/release()
</code></pre>
<pre><code>   latch:     count down to zero once, then all waiters proceed. (start signal)
   barrier:   phased rendezvous for N threads, reusable across rounds.
   semaphore: N permits; acquire blocks if none left, release adds one.
   -&gt; Reach for THESE before building coordination out of raw atomics.
</code></pre>
<hr />
<h2 id="7-c23-small-atomic-refinements">7. C++23: small atomic refinements</h2>
<pre><code>   * std::atomic / atomic_ref usable in more constexpr-friendly contexts.
   * &lt;stdatomic.h&gt; (C++23): the C atomics header is now provided in C++ for
     interop; std::atomic&lt;T&gt; and _Atomic interoperate more cleanly.
   * Improved specification/wording; atomic_ref for more types.
   * std::atomic_ref support and lock-free guarantees clarified.
</code></pre>
<p>C++23 is mostly polish for atomics; the big library concurrency addition was
elsewhere (e.g. <code>std::jthread</code>/<code>stop_token</code> came in C++20, <code>std::expected</code>, etc.).</p>
<hr />
<h2 id="8-c26-standard-safe-memory-reclamation--more">8. C++26: standard safe memory reclamation &amp; more</h2>
<p>C++26 tackles the hardest lock-free problem from chapter 11 by standardizing
<strong>reclamation primitives</strong>, plus other concurrency items.</p>
<pre><code>   * std::hazard_pointer / std::hazard_pointer_obj_base  (P2530)
       -&gt; standard hazard pointers for safe lock-free reclamation.
   * std::rcu_domain, rcu_synchronize, rcu_retire        (P2545)
       -&gt; standard Read-Copy-Update.
   * Refinements to the memory model wording (ongoing) and to atomic_ref.
   * std::execution (senders/receivers, P2300): a whole async framework built on
     these foundations.
   * Continued constexpr-ification and interop.
</code></pre>
<h3 id="hazard-pointers-conceptual-c26-usage">Hazard pointers (conceptual C++26 usage)</h3>
<pre><code class="language-cpp">// Conceptual — names/spelling may shift before publication.
struct Node : std::hazard_pointer_obj_base&lt;Node&gt; { /* ... */ };

// Reader protects a node while using it:
std::hazard_pointer h = std::make_hazard_pointer();
Node* p = h.protect(head);        // publishes p as a hazard; safe to deref p
// ... use p ...

// Reclaimer retires instead of delete:
old-&gt;retire();                     // freed only when no hazard protects it
</code></pre>
<pre><code>   This bakes the chapter-11 hazard-pointer scheme into the standard library, so
   you get correct reclamation without hand-writing the scanning logic. Big deal
   for anyone doing serious lock-free work.
</code></pre>
<h3 id="rcu-conceptual">RCU (conceptual)</h3>
<pre><code class="language-cpp">// Readers are cheap; writers copy-update then defer reclamation.
std::rcu_domain&amp; dom = std::rcu_default_domain();
// reader:  rcu_read region; access shared pointer
// writer:  install new version; rcu_retire(old); rcu_synchronize() before free
</code></pre>
<p>Availability: <strong>experimental / not widely shipped yet in 2026.</strong> Treat as the
future direction; check your standard library.</p>
<hr />
<h2 id="9-what-to-actually-use-today-2026">9. What to actually use today (2026)</h2>
<pre><code>   Everyday:
     * std::atomic&lt;int/bool/ptr&gt; with seq_cst or acquire/release (chapters 5-6)
     * std::atomic&lt;bool&gt; + wait/notify, or std::stop_token/jthread, for signaling
     * std::mutex / lock_guard for anything non-trivial
     * std::latch / barrier / semaphore for coordination
   Read-mostly shared object swaps:
     * std::atomic&lt;std::shared_ptr&lt;T&gt;&gt;  (correct, easy; check lock-free)
   Element-wise atomics over existing arrays/structs:
     * std::atomic_ref&lt;T&gt;
   Serious lock-free with reclamation:
     * a vetted library now; std::hazard_pointer / std::rcu when your stdlib ships it
</code></pre>

<p>Quick recall. Read the chapters first; this is the reference card.</p>
<hr />
<h2 id="declaring--core-ops">Declaring &amp; core ops</h2>
<pre><code class="language-cpp">#include &lt;atomic&gt;
std::atomic&lt;int&gt; a{0};          // brace-init; NOT copyable/movable

int v = a.load();               // read           (seq_cst default)
a.store(1);                     // write
int old = a.exchange(2);        // swap, return old
a.fetch_add(5); a.fetch_sub(1); // RMW, return OLD value
a.fetch_and(x); a.fetch_or(x); a.fetch_xor(x);
++a; a++; --a; a--; a += 3;     // atomic RMW (++a returns new; a++ old)
// a = a + 1;  // BUG: two ops, not atomic. Use ++a / fetch_add.

int expected = 2;
a.compare_exchange_weak(expected, 9,   success_order, failure_order);
a.compare_exchange_strong(expected, 9);

constexpr bool lf = std::atomic&lt;int&gt;::is_always_lock_free;   // compile-time
</code></pre>
<h2 id="the-six-memory-orders">The six memory orders</h2>
<pre><code>  relaxed : atomicity + per-object coherence only. No cross-var ordering.
  consume : DON'T USE. Compilers promote to acquire.
  acquire : LOAD/RMW. Nothing after moves before; pulls in releaser's writes.
  release : STORE/RMW. Nothing before moves after; publishes prior writes.
  acq_rel : RMW. acquire + release.
  seq_cst : acquire+release + single GLOBAL total order. DEFAULT. Safest.

  loads -&gt; acquire,  stores -&gt; release,  RMW -&gt; acq_rel.  Unsure -&gt; seq_cst.
</code></pre>
<h2 id="which-order-on-which-op">Which order on which op</h2>
<pre><code>  load  : relaxed / acquire / seq_cst                (NOT release/acq_rel)
  store : relaxed / release / seq_cst                (NOT acquire/acq_rel)
  RMW   : relaxed / acquire / release / acq_rel / seq_cst
  CAS failure order: &lt;= success, and never release/acq_rel (it's a load)
</code></pre>
<h2 id="the-publishing-handshake-the-1-pattern">The publishing handshake (the #1 pattern)</h2>
<pre><code class="language-cpp">// producer                          // consumer
data = ...;                          while(!ready.load(acquire)) {}
ready.store(true, release);          use(data);   // safe: happens-before
// one atomic (ready) safely publishes arbitrary non-atomic 'data'.
</code></pre>
<h2 id="happens-before-sources">Happens-before sources</h2>
<pre><code>  * mutex unlock -&gt; lock (same mutex)
  * store-release -&gt; load-acquire (reading that value)
  * thread ctor: parent's prior work -&gt; new thread start
  * thread.join(): thread's work -&gt; after join()
  * release fence + relaxed store/load + acquire fence
</code></pre>
<h2 id="compare-exchange">Compare-exchange</h2>
<pre><code>  weak   : may fail spuriously -&gt; use IN A LOOP (cheaper).
  strong : no spurious fail    -&gt; use for a SINGLE attempt.

  CAS loop:
    T cur = a.load(relaxed);
    while(!a.compare_exchange_weak(cur, f(cur), release, relaxed)) {}
    // 'cur' auto-refreshed on failure.

  ABA: value A-&gt;B-&gt;A makes CAS wrongly succeed. Fix: tagged ptr / hazard ptr / RCU.
</code></pre>
<h2 id="fences">Fences</h2>
<pre><code class="language-cpp">std::atomic_thread_fence(std::memory_order_release);  // before a relaxed store
std::atomic_thread_fence(std::memory_order_acquire);  // after  a relaxed load
std::atomic_thread_fence(std::memory_order_seq_cst);  // full barrier + global order
std::atomic_signal_fence(order);   // compiler-only; same-thread signal handlers
</code></pre>
<h2 id="patterns">Patterns</h2>
<pre><code class="language-cpp">// stop flag
std::atomic&lt;bool&gt; stop{false};
while(!stop.load(acquire)) work();          stop.store(true, release);

// spinlock
std::atomic_flag f{};
void lock(){ while(f.test_and_set(acquire)) /*spin: while(f.test())*/; }
void unlock(){ f.clear(release); }

// lazy init -&gt; prefer:
Widget&amp; get(){ static Widget w; return w; }  // thread-safe since C++11
// or std::call_once(once_flag, init);

// counter (relaxed OK)
cnt.fetch_add(1, relaxed);

// publish whole object (read-mostly)
std::atomic&lt;std::shared_ptr&lt;Cfg&gt;&gt; cfg;   // load()/store(), auto-reclaimed (C++20)
</code></pre>
<h2 id="c202326-features">C++20/23/26 features</h2>
<pre><code>  C++20: a.wait(old)/notify_one()/notify_all()   (block instead of spin)
         std::atomic_ref&lt;T&gt;(obj)                  (atomic view over plain object)
         std::atomic&lt;std::shared_ptr&lt;T&gt;&gt;          (easy safe reclamation)
         atomic&lt;float/double&gt; fetch_add
         atomic_flag test()/wait()
         std::latch, std::barrier, std::counting_semaphore
         std::jthread, std::stop_token            (cancellation)
  C++23: &lt;stdatomic.h&gt; interop, constexpr/wording polish
  C++26: std::hazard_pointer, std::rcu_*          (standard reclamation)
         std::execution (senders/receivers)
</code></pre>
<h2 id="pitfalls-checklist">Pitfalls checklist</h2>
<pre><code>  [ ] volatile is NOT for threads -&gt; use std::atomic
  [ ] a=a+1 / if(a)... are NOT atomic composites -&gt; RMW / CAS / mutex
  [ ] relaxed flag guarding data -&gt; UB (need release/acquire)
  [ ] false sharing -&gt; alignas(hardware_destructive_interference_size)
  [ ] never mix atomic + plain access to the same object
  [ ] acquire/release do NOT stop StoreLoad (SB litmus) -&gt; seq_cst for that
  [ ] lock-free pop needs safe reclamation (hazard ptr / RCU / atomic shared_ptr)
  [ ] test on ARM + ThreadSanitizer; x86 hides ordering bugs
</code></pre>
<h2 id="decision-guide">Decision guide</h2>
<pre><code>  Shared mutable state?
    -&gt; read-only after publish?          plain data + one release/acquire publish
    -&gt; just a counter/flag value?         atomic + relaxed (counter) / acquire (flag)
    -&gt; multi-step invariant?              std::mutex   (default, simplest)
    -&gt; read-mostly whole-object swap?     std::atomic&lt;std::shared_ptr&lt;T&gt;&gt;
    -&gt; element-wise atomic on an array?   std::atomic_ref&lt;T&gt;
    -&gt; coordinate N threads?              latch / barrier / semaphore
    -&gt; truly need lock-free structure?    library now / std::hazard_pointer (C++26)
    -&gt; not sure?                          std::mutex + seq_cst atomics
</code></pre>
<h2 id="golden-rules">Golden rules</h2>
<pre><code>  1. Prefer a mutex. Atomics are the exception, not the rule.
  2. Default to seq_cst. Weaken only with proof + profiling.
  3. relaxed is for value-only counters, not for publishing data.
  4. Atomicity != algorithm correctness (check-then-act still races).
  5. Test with ThreadSanitizer and on weakly-ordered hardware.
</code></pre>
<hr />

constexpr int THREADS    = 8;

        std::vector&lt;std::thread&gt; ts;

<pre><code class="language-cpp">// ch04 — release/acquire message passing publishes non-atomic data safely.
// build: clang++ -std=c++20 -O2 -pthread ch04_message_passing.cpp -o /tmp/d &amp;&amp; /tmp/d
// Try under TSan too (should be CLEAN because it's correctly synchronized):
//   clang++ -std=c++20 -O1 -g -fsanitize=thread -pthread ch04_message_passing.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;cassert&gt;
#include &lt;iostream&gt;

int payload = 0;                 // plain int (non-atomic)
std::atomic&lt;bool&gt; ready{false};

void producer() {
    payload = 99;                                    // (1)
    ready.store(true, std::memory_order_release);    // (2) publish
}

void consumer() {
    while (!ready.load(std::memory_order_acquire))   // (3) wait
        std::this_thread::yield();
    assert(payload == 99);                           // (4) never fires
    std::cout &lt;&lt; &quot;consumer saw payload = &quot; &lt;&lt; payload &lt;&lt; '\\n';
}

int main() {
    for (int trial = 0; trial &lt; 1000; ++trial) {
        payload = 0;
        ready.store(false);
        std::thread c(consumer);
        std::thread p(producer);
        p.join();
        c.join();
    }
    std::cout &lt;&lt; &quot;1000 trials passed (no torn/stale reads)\\n&quot;;
}

</code></pre>` },

<pre><code class="language-cpp">// ch06 — a shared_ptr-like refcount: relaxed increment, acq_rel decrement.
// build: clang++ -std=c++20 -O2 -pthread ch06_refcount.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

struct Object {
    int data = 12345;
    std::atomic&lt;int&gt; refcount{1};
};

void acquire_ref(Object* o) {
    o-&gt;refcount.fetch_add(1, std::memory_order_relaxed);   // counting only
}

void release_ref(Object*&amp; o) {
    // acq_rel so the final deleter sees all prior uses of *o.
    if (o-&gt;refcount.fetch_sub(1, std::memory_order_acq_rel) == 1) {
        // we dropped the last reference -&gt; exclusive owner now.
        delete o;
        o = nullptr;
    }
}

int main() {
    Object* obj = new Object();      // refcount starts at 1

    constexpr int N = 8;
    std::vector&lt;std::thread&gt; ts;
    for (int i = 0; i &lt; N; ++i) {
        acquire_ref(obj);            // +1 for each thread (main-thread safe here)
        ts.emplace_back([obj]() mutable {
            Object* local = obj;     // pretend each thread owns a ref
            volatile int x = local-&gt;data; (void)x;
            release_ref(local);      // each releases its ref
        });
    }
    for (auto&amp; t : ts) t.join();

    release_ref(obj);                // release the original ref -&gt; deletes
    std::cout &lt;&lt; (obj == nullptr ? &quot;object freed exactly once\\n&quot;
                                 : &quot;LEAK/BUG\\n&quot;);
}

</code></pre>` },

<pre><code class="language-cpp">// ch09 — fence-based message passing (release fence + relaxed store).
// build: clang++ -std=c++20 -O2 -pthread ch09_fence.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;cassert&gt;
#include &lt;iostream&gt;

int a = 0, b = 0, c = 0;             // plain data
std::atomic&lt;bool&gt; ready{false};

void producer() {
    a = 1; b = 2; c = 3;                                    // relaxed writes
    std::atomic_thread_fence(std::memory_order_release);    // one barrier
    ready.store(true, std::memory_order_relaxed);           // relaxed store
}

void consumer() {
    while (!ready.load(std::memory_order_relaxed))          // relaxed load
        std::this_thread::yield();
    std::atomic_thread_fence(std::memory_order_acquire);    // one barrier
    assert(a == 1 &amp;&amp; b == 2 &amp;&amp; c == 3);                     // all visible
}

int main() {
    for (int i = 0; i &lt; 1000; ++i) {
        a = b = c = 0; ready.store(false);
        std::thread cs(consumer), pr(producer);
        pr.join(); cs.join();
    }
    std::cout &lt;&lt; &quot;fence-based publish OK for 1000 trials\\n&quot;;
}

  { name: `24. Examples / Ch10 Cas Stack`, path: `examples/ch10_cas_stack.cpp`, dir: `examples`, words: 214, mins: 1, body: `<h1 id="ch10_cas_stackcpp">ch10_cas_stack.cpp</h1>
<pre><code class="language-cpp">// ch10 — lock-free Treiber stack push via CAS loop.
// NOTE: pop() here LEAKS nodes on purpose (safe reclamation is chapter 11's
// topic). This demonstrates the CAS mechanics, not production reclamation.
// build: clang++ -std=c++20 -O2 -pthread ch10_cas_stack.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

template &lt;class T&gt;
class LockFreeStack {
    struct Node { T value; Node* next; };
    std::atomic&lt;Node*&gt; head_{nullptr};
public:
    void push(T v) {
        Node* n = new Node{v, head_.load(std::memory_order_relaxed)};
        while (!head_.compare_exchange_weak(n-&gt;next, n,
                   std::memory_order_release,
                   std::memory_order_relaxed)) {}
    }
    bool pop(T&amp; out) {
        Node* old = head_.load(std::memory_order_acquire);
        while (old &amp;&amp; !head_.compare_exchange_weak(old, old-&gt;next,
                   std::memory_order_acquire,
                   std::memory_order_relaxed)) {}
        if (!old) return false;
        out = old-&gt;value;
        // Intentionally NOT deleting 'old' — see chapter 11 (reclamation/ABA).
        return true;
    }
};

int main() {
    LockFreeStack&lt;int&gt; stack;
    constexpr int THREADS = 4, PER = 10000;

    std::vector&lt;std::thread&gt; pushers;
    for (int i = 0; i &lt; THREADS; ++i)
        pushers.emplace_back([&amp;] { for (int j = 0; j &lt; PER; ++j) stack.push(j); });
    for (auto&amp; t : pushers) t.join();

    std::atomic&lt;long&gt; popped{0};
    std::vector&lt;std::thread&gt; poppers;
    for (int i = 0; i &lt; THREADS; ++i)
        poppers.emplace_back([&amp;] {
            int v;
            while (stack.pop(v)) popped.fetch_add(1, std::memory_order_relaxed);
        });
    for (auto&amp; t : poppers) t.join();

    std::cout &lt;&lt; &quot;pushed &quot; &lt;&lt; (long)THREADS * PER
              &lt;&lt; &quot;, popped &quot; &lt;&lt; popped.load() &lt;&lt; &quot; (should match)\\n&quot;;
}

</code></pre>` },

<pre><code class="language-cpp">// ch10 — implement atomic fetch_max with a CAS loop (no built-in for it).
// build: clang++ -std=c++20 -O2 -pthread ch10_fetch_max.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

int atomic_fetch_max(std::atomic&lt;int&gt;&amp; a, int v) {
    int cur = a.load(std::memory_order_relaxed);
    while (v &gt; cur &amp;&amp;
           !a.compare_exchange_weak(cur, v, std::memory_order_relaxed)) {
        // cur refreshed by failed CAS; loop re-checks v &gt; cur
    }
    return cur;
}

int main() {
    std::atomic&lt;int&gt; peak{0};
    std::vector&lt;std::thread&gt; ts;
    for (int i = 0; i &lt; 8; ++i)
        ts.emplace_back([&amp;, i] {
            for (int j = 0; j &lt; 100000; ++j)
                atomic_fetch_max(peak, (i * 100000 + j) % 777777);
        });
    for (auto&amp; t : ts) t.join();
    std::cout &lt;&lt; &quot;peak observed = &quot; &lt;&lt; peak.load() &lt;&lt; '\\n';
}

<pre><code class="language-cpp">// ch11 — single-producer single-consumer lock-free ring buffer.
// build: clang++ -std=c++20 -O2 -pthread ch11_spsc_queue.cpp -o /tmp/d &amp;&amp; /tmp/d
// Try under TSan (should be clean):
//   clang++ -std=c++20 -O1 -g -fsanitize=thread -pthread ch11_spsc_queue.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;vector&gt;
#include &lt;optional&gt;
#include &lt;thread&gt;
#include &lt;iostream&gt;
#include &lt;new&gt;

template &lt;class T&gt;
class SpscQueue {
    std::vector&lt;T&gt; buf_;
    std::size_t    cap_;
    alignas(std::hardware_destructive_interference_size) std::atomic&lt;std::size_t&gt; head_{0};
    alignas(std::hardware_destructive_interference_size) std::atomic&lt;std::size_t&gt; tail_{0};
public:
    explicit SpscQueue(std::size_t cap) : buf_(cap + 1), cap_(cap + 1) {}

    bool push(const T&amp; item) {
        const auto tail = tail_.load(std::memory_order_relaxed);
        const auto next = (tail + 1) % cap_;
        if (next == head_.load(std::memory_order_acquire)) return false; // full
        buf_[tail] = item;
        tail_.store(next, std::memory_order_release);
        return true;
    }
    std::optional&lt;T&gt; pop() {
        const auto head = head_.load(std::memory_order_relaxed);
        if (head == tail_.load(std::memory_order_acquire)) return std::nullopt; // empty
        T item = buf_[head];
        head_.store((head + 1) % cap_, std::memory_order_release);
        return item;
    }
};

int main() {
    SpscQueue&lt;int&gt; q(1024);
    constexpr int N = 1000000;
    long long sum = 0;

    std::thread producer([&amp;] {
        for (int i = 1; i &lt;= N; ++i)
            while (!q.push(i)) std::this_thread::yield();
    });
    std::thread consumer([&amp;] {
        int received = 0;
        while (received &lt; N) {
            if (auto v = q.pop()) { sum += *v; ++received; }
            else std::this_thread::yield();
        }
    });
    producer.join();
    consumer.join();

    long long expected = 1LL * N * (N + 1) / 2;
    std::cout &lt;&lt; &quot;sum=&quot; &lt;&lt; sum &lt;&lt; &quot; expected=&quot; &lt;&lt; expected
              &lt;&lt; (sum == expected ? &quot; OK\\n&quot; : &quot; MISMATCH\\n&quot;);
}

</code></pre>` },

<pre><code class="language-cpp">// ch12 — measure the cost of false sharing.
// build: clang++ -std=c++20 -O2 -pthread ch12_false_sharing.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;vector&gt;
#include &lt;chrono&gt;
#include &lt;iostream&gt;
#include &lt;new&gt;

constexpr int THREADS = 4;
constexpr long ITERS  = 50'000'000;

struct Shared {                 // all counters in ONE cache line -&gt; false sharing
    std::atomic&lt;long&gt; c[THREADS];
};

struct Padded {                 // each counter on its own cache line
    struct alignas(std::hardware_destructive_interference_size) Cell {
        std::atomic&lt;long&gt; v{0};
    };
    Cell c[THREADS];
};

template &lt;class Arr&gt;
double bench(Arr&amp; arr) {
    auto get = [&amp;](int i) -&gt; std::atomic&lt;long&gt;&amp; {
        if constexpr (requires { arr.c[i].v; }) return arr.c[i].v;
        else                                    return arr.c[i];
    };
    auto start = std::chrono::steady_clock::now();
    std::vector&lt;std::thread&gt; ts;
    for (int i = 0; i &lt; THREADS; ++i)
        ts.emplace_back([&amp;, i] {
            for (long j = 0; j &lt; ITERS; ++j)
                get(i).fetch_add(1, std::memory_order_relaxed);
        });
    for (auto&amp; t : ts) t.join();
    auto end = std::chrono::steady_clock::now();
    return std::chrono::duration&lt;double&gt;(end - start).count();
}

int main() {
    Shared shared{};
    Padded padded{};
    double t_false = bench(shared);
    double t_pad   = bench(padded);
    std::cout &lt;&lt; &quot;false sharing : &quot; &lt;&lt; t_false &lt;&lt; &quot; s\\n&quot;;
    std::cout &lt;&lt; &quot;padded        : &quot; &lt;&lt; t_pad   &lt;&lt; &quot; s\\n&quot;;
    std::cout &lt;&lt; &quot;speedup       : &quot; &lt;&lt; (t_false / t_pad) &lt;&lt; &quot;x\\n&quot;;
}

</code></pre>` },

<pre><code class="language-cpp">// ch12 — a spinlock built from atomic_flag (test-and-test-and-set).
// build: clang++ -std=c++20 -O2 -pthread ch12_spinlock.cpp -o /tmp/d &amp;&amp; /tmp/d
#include &lt;atomic&gt;
#include &lt;thread&gt;
#include &lt;vector&gt;
#include &lt;iostream&gt;

class SpinLock {
    std::atomic_flag flag_ = ATOMIC_FLAG_INIT;
public:
    void lock() {
        while (flag_.test_and_set(std::memory_order_acquire)) {
#if defined(__cpp_lib_atomic_flag_test)
            while (flag_.test(std::memory_order_relaxed))   // read-only spin
#endif
                std::this_thread::yield();
        }
    }
    void unlock() { flag_.clear(std::memory_order_release); }
};

SpinLock lock;
long guarded = 0;   // protected by the spinlock (plain long is fine inside)

int main() {
    constexpr int THREADS = 8, PER = 100000;
    std::vector&lt;std::thread&gt; ts;
    for (int i = 0; i &lt; THREADS; ++i)
        ts.emplace_back([] {
            for (int j = 0; j &lt; PER; ++j) {
                lock.lock();
                ++guarded;          // critical section
                lock.unlock();
            }
        });
    for (auto&amp; t : ts) t.join();
    std::cout &lt;&lt; &quot;guarded = &quot; &lt;&lt; guarded
              &lt;&lt; &quot; (expected &quot; &lt;&lt; (long)THREADS * PER &lt;&lt; &quot;)\\n&quot;;
}

</code></pre>` },

const docSelect = document.getElementById('docSelect');
const docList = document.getElementById('docList');
const tabPanels = document.getElementById('tabPanels');
const navDocTitle = document.getElementById('navDocTitle');
let navLastY = 0;

// Prettify function in JS (matching Python's prettify)
function prettify(component) {
    let c = component.replace(/^[0-9]+[_-]/, '');
    c = c.replace(/_/g, ' ').replace(/-/g, ' ').trim();
    if (c.toLowerCase() === 'readme') return 'README';
    if (c.toLowerCase() === 'cheatsheet') return 'Cheatsheet';
    return c.replace(/\b\w/g, l => l.toUpperCase());
}

// Like prettify(), but keeps any leading "01_"/"2-" style number as a "01. "
// prefix so the sidebar mirrors the on-disk ordering of the documents.
function prettifyKeepNum(component) {
    const m = component.match(/^([0-9]+)[_-]/);
    const prefix = m ? m[1] + '. ' : '';
    return prefix + prettify(component);
}

const HTML_ESCAPES = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' };
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => HTML_ESCAPES[c]); }
function cleanName(name) { return (name || '').replace(/^\s*\d+\.\s*/, ''); }

const CLOCK_ICON = '<svg class="icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1.5a6.5 6.5 0 1 0 0 13 6.5 6.5 0 0 0 0-13ZM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8Zm8.75-4.25v3.94l2.4 2.4a.75.75 0 0 1-1.06 1.06l-2.62-2.62a.75.75 0 0 1-.22-.53V3.75a.75.75 0 0 1 1.5 0Z"></path></svg>';

        displayName = prettifyKeepNum(displayName);

}

const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

TAB_DATA.forEach((tab, idx) => {
    const path = (tab.path || '').toLowerCase();
    if (path) BY_PATH[path] = idx;
    const base = path.split('/').pop();
    if (base) {
        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;
        else BY_BASENAME[base] = idx;
    }
    if (base === 'readme.md') {
        BY_DIR_README[(tab.dir || '').toLowerCase()] = idx;
    }
});
Object.keys(BASENAME_DUP).forEach(b => { delete BY_BASENAME[b]; });

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}

highlightAllCode();

function wrapTables() {
    document.querySelectorAll('.tab-content table').forEach(table => {
        if (table.parentElement && table.parentElement.classList.contains('table-scroll')) return;
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        table.parentNode.insertBefore(wrap, table);
        wrap.appendChild(table);

}

function getStoredTheme() {
    try { return localStorage.getItem('doc-theme'); } catch(e) { return null; }
}

const darkMql = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
function osTheme() { return (darkMql && darkMql.matches) ? 'dark' : 'light'; }

// Apply a theme. `persist` is true ONLY for an explicit user action; auto/OS
// applications must NOT write to storage, otherwise the very first auto theme
// would look like an explicit choice and we'd stop following the OS.
function setTheme(theme, persist) {
    document.body.setAttribute('data-theme', theme);
    hljsLink.href = theme === 'light' ? HLJS_LIGHT : HLJS_DARK;
    themeToggleBtn.innerHTML = (theme === 'light' ? ICON_SUN : ICON_MOON);
    themeToggleBtn.title = theme === 'light'
        ? 'Switch to dark mode (Ctrl+Shift+L)'
        : 'Switch to light mode (Ctrl+Shift+L)';
    if (persist) {
        try { localStorage.setItem('doc-theme', theme); } catch(e) {}
    }
}

function toggleTheme() {
    const current = document.body.getAttribute('data-theme') || 'dark';
    setTheme(current === 'dark' ? 'light' : 'dark', true);
}

(function initTheme() {
    const stored = getStoredTheme();
    if (stored === 'light' || stored === 'dark') {
        setTheme(stored, false);              // explicit user choice wins
    } else {
        setTheme(osTheme(), false);           // otherwise follow the OS (live)
    }
})();

// Live-follow the OS appearance while the reader hasn't picked a theme manually.
if (darkMql) {
    const onOsChange = (e) => {
        const stored = getStoredTheme();
        if (stored !== 'light' && stored !== 'dark') {
            setTheme(e.matches ? 'dark' : 'light', false);
        }
    };
    if (darkMql.addEventListener) darkMql.addEventListener('change', onOsChange);
    else if (darkMql.addListener) darkMql.addListener(onOsChange);  // older Safari
}

themeToggleBtn.addEventListener('click', toggleTheme);

/* ───── Tab activation ───── */
/* - Nagesh N Nazare - */

function activateTab(idx, resetScroll) {
    if (resetScroll === undefined) resetScroll = true;
    document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + idx).classList.add('active');
    docSelect.value = String(idx);
    docList.querySelectorAll('a').forEach(a => {
        a.classList.toggle('nav-doc-active', parseInt(a.dataset.docIdx, 10) === idx);
    });
    const activeLink = docList.querySelector(`a[data-doc-idx="${idx}"]`);
    if (activeLink) {
        let parent = activeLink.closest('.nav-dir-item');
        while (parent) {
            parent.classList.add('expanded');
            parent = parent.parentElement.closest('.nav-dir-item');
        }
    }
    if (window.innerWidth <= 1024) {
        sidebarNav.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
        const tSidebar = document.getElementById('tocSidebar');
        if (tSidebar) {
            tSidebar.classList.add('collapsed');
            document.body.classList.add('toc-collapsed');
        }
    }
    history.replaceState(null, null, '#tab-' + idx);
    if (typeof buildToc === 'function') buildToc(idx);
    // Reflect the active document's title in the condensing navbar. Use the
    // full name (including any leading number) so it matches the picker exactly.
    if (navDocTitle && TAB_DATA[idx]) {
        navDocTitle.textContent = TAB_DATA[idx].name;
    }
    if (typeof updateDocNav === 'function') updateDocNav(idx);
    // Jump back to the top when switching documents so the reader starts at
    // the beginning rather than wherever the previous doc was scrolled to.
    if (resetScroll) {
        window.scrollTo({ top: 0, behavior: 'auto' });
        document.body.classList.remove('nav-condensed');
        navLastY = 0;
    }
    LS.set('doc-last-idx', String(idx));
}

/* ───── Lightweight state persistence (no per-scroll writes) ─────
   Remembers the last document, sidebar/TOC open state and scroll position so
   reopening the file resumes where you left off. Writes happen only on tab
   switch, panel toggle and page hide -- never during scrolling. */
/* - Nagesh N Nazare - */
const LS = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
};

function persistScroll() {
    LS.set('doc-last-idx', String(currentTabIdx()));
    LS.set('doc-last-y', String(Math.round(window.scrollY)));
}
window.addEventListener('pagehide', persistScroll);
document.addEventListener('visibilitychange', function () {
    if (document.visibilityState === 'hidden') persistScroll();
});

/* ───── Search index: pre-extract plain text per block ───── */
/* - Nagesh N Nazare - */

const searchIndex = [];

TAB_DATA.forEach((tab, tabIdx) => {
    const tmp = document.createElement('div');
    tmp.innerHTML = tab.body;
    let currentHeading = '';

    function walk(node) {
        for (const child of node.childNodes) {
            if (child.nodeType === Node.ELEMENT_NODE) {
                const tag = child.tagName;
                if (/^H[1-6]$/.test(tag)) {
                    currentHeading = child.textContent.trim();
                }
                const text = child.textContent.trim();
                if (text.length > 0) {
                    searchIndex.push({
                        tabIdx: tabIdx,
                        tabName: tab.name,
                        heading: currentHeading,
                        text: text,
                        tag: tag
                    });
                }
                if (/^(P|LI|TD|TH|BLOCKQUOTE|PRE|H[1-6])$/.test(tag)) {
                    continue;
                }
                walk(child);
            }
        }
    }
    walk(tmp);
});

/* ───── Search overlay logic ───── */
/* - Nagesh N Nazare - */

const overlay = document.getElementById('searchOverlay');
const searchInput = document.getElementById('searchInput');
const searchTrigger = document.getElementById('searchTrigger');
const srBody = document.getElementById('srBody');
const srCount = document.getElementById('srCount');
let srActiveIdx = -1;
let srResults = [];

function openSearch() {
    overlay.classList.add('open');
    searchInput.value = '';
    searchInput.focus();
    srBody.innerHTML = '<div class="sr-empty">Type to search across all tabs</div>';
    srCount.textContent = '';
    srActiveIdx = -1;
    srResults = [];
}

function closeSearch() {
    overlay.classList.remove('open');
    searchInput.value = '';
}

searchTrigger.addEventListener('click', openSearch);

overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeSearch();
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (overlay.classList.contains('open')) closeSearch();
        else openSearch();
        return;
    }
    if (e.key === '/' && !overlay.classList.contains('open') &&
        !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        openSearch();
        return;
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
        closeSearch();
        return;
    }
    if (overlay.classList.contains('open')) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.min(srActiveIdx + 1, srResults.length - 1);
                updateActiveResult();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.max(srActiveIdx - 1, 0);
                updateActiveResult();
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (srActiveIdx >= 0 && srActiveIdx < srResults.length) {
                navigateToResult(srResults[srActiveIdx]);
            }
        }
    }
});

function updateActiveResult() {
    srBody.querySelectorAll('.sr-item').forEach((el, i) => {
        el.classList.toggle('sr-active', i === srActiveIdx);
    });
    const active = srBody.querySelector('.sr-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightSnippet(text, query, maxLen) {
    const lower = text.toLowerCase();
    const qLower = query.toLowerCase();
    const pos = lower.indexOf(qLower);
    if (pos < 0) return text.substring(0, maxLen);

    const pad = Math.floor((maxLen - query.length) / 2);
    let start = Math.max(0, pos - pad);
    let end = Math.min(text.length, pos + query.length + pad);
    let snippet = text.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet = snippet + '...';

    const re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
    return snippet.replace(re, '<mark>$1</mark>');
}

let searchTimer = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 120);
});

function runSearch() {
    const query = searchInput.value.trim();
    if (query.length < 2) {
        srBody.innerHTML = '<div class="sr-empty">Type at least 2 characters</div>';
        srCount.textContent = '';
        srResults = [];
        srActiveIdx = -1;
        return;
    }

    const qLower = query.toLowerCase();
    const matches = [];
    const seen = new Set();

    for (const entry of searchIndex) {
        if (entry.text.toLowerCase().includes(qLower)) {
            const key = entry.tabIdx + ':' + entry.heading + ':' + entry.text.substring(0, 80);
            if (seen.has(key)) continue;
            seen.add(key);
            matches.push(entry);
            if (matches.length >= 100) break;
        }
    }

    srResults = matches;
    srActiveIdx = matches.length > 0 ? 0 : -1;

    if (matches.length === 0) {
        srBody.innerHTML = '<div class="sr-empty">No results for "' +
            query.replace(/</g,'&lt;') + '"</div>';
        srCount.textContent = '0 results';
        return;
    }

    srCount.textContent = matches.length >= 100 ? '100+ results' : matches.length + ' result' + (matches.length > 1 ? 's' : '');

    let html = '';
    matches.forEach((m, i) => {
        const snippet = highlightSnippet(m.text, query, 160);
        html += '<div class="sr-item' + (i === 0 ? ' sr-active' : '') + '" data-ridx="' + i + '">';
        html += '<div class="sr-item-tab">' + m.tabName + '</div>';
        if (m.heading) html += '<div class="sr-item-heading">' + m.heading.replace(/</g,'&lt;') + '</div>';
        html += '<div class="sr-item-snippet">' + snippet + '</div>';
        html += '</div>';
    });
    srBody.innerHTML = html;

    srBody.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.ridx, 10);
            navigateToResult(srResults[idx]);
        });
    });
}

function navigateToResult(result) {
    const savedQuery = searchInput.value.trim() || result.text.substring(0, 20);
    pushHistory();
    closeSearch();
    activateTab(result.tabIdx, false);

    requestAnimationFrame(() => {
        clearHighlights();
        const panel = document.getElementById('panel-' + result.tabIdx);
        const qLower = savedQuery.toLowerCase();
        const qLen = savedQuery.length;

        const hits = [];
        const walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
            const node = walker.currentNode;
            const idx = node.textContent.toLowerCase().indexOf(qLower);
            if (idx >= 0) {
                hits.push({ node: node, offset: idx });
            }
        }

        let firstMark = null;
        for (let i = hits.length - 1; i >= 0; i--) {
            const h = hits[i];
            const range = document.createRange();
            range.setStart(h.node, h.offset);
            range.setEnd(h.node, h.offset + qLen);
            const mark = document.createElement('span');
            mark.className = 'search-highlight';
            mark.dataset.searchHighlight = '1';
            try { range.surroundContents(mark); firstMark = mark; } catch(e) {}
        }

        if (firstMark) {
            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        setTimeout(clearHighlights, 6000);
    });
}

function clearHighlights() {
    document.querySelectorAll('[data-search-highlight]').forEach(el => {
        const parent = el.parentNode;
        parent.replaceChild(document.createTextNode(el.textContent), el);
        parent.normalize();
    });
}

/* ───── Sidebar TOC + scroll spy ───── */
/* - Nagesh N Nazare - */

const sidebarNav = document.getElementById('sidebarNav');
const navList = document.getElementById('navList');
const sidebarToggle = document.getElementById('sidebarToggle');
const readProgress = document.getElementById('readProgress');
const toTopBtn = document.getElementById('toTop');
let currentTocHeadings = [];

function buildToc(panelIdx) {
    navList.innerHTML = '';
    currentTocHeadings = [];
    const panel = document.getElementById('panel-' + panelIdx);
    if (!panel) return;
    const headings = panel.querySelectorAll('h1, h2, h3, h4');
    headings.forEach((h, i) => {
        if (!h.id) h.id = 'autoid-' + panelIdx + '-' + i;
        // Capture the clean heading text once (before any permalink anchor is
        // added) so the TOC label never picks up the trailing '#'.
        let title = h.getAttribute('data-title');
        if (title === null) {
            title = h.textContent;
            h.setAttribute('data-title', title);
            // Add a hover-revealed permalink anchor (built lazily, only for the
            // doc currently being viewed).
            const perma = document.createElement('a');
            perma.className = 'heading-anchor';
            perma.href = '#' + h.id;
            perma.textContent = '#';
            perma.setAttribute('aria-label', 'Copy link to this section');
            perma.title = 'Copy link to this section';
            const headingId = h.id;
            perma.addEventListener('click', function(e) {
                e.preventDefault();
                // Keep the doc-content click handler from also firing (it would
                // re-run scroll/history logic and resolve duplicate ids).
                e.stopPropagation();
                const url = location.href.split('#')[0] + '#' + headingId;
                const flash = function() {
                    perma.classList.remove('copied');
                    // Force reflow so the animation restarts on rapid clicks.
                    void perma.offsetWidth;
                    perma.classList.add('copied');
                    setTimeout(function() { perma.classList.remove('copied'); }, 1400);
                };
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(url).then(flash).catch(function() { fallbackCopy(url, flash); });
                } else {
                    fallbackCopy(url, flash);
                }
                history.replaceState(null, '', '#' + headingId);
                scrollToTarget(h);
            });
            h.appendChild(perma);
        }
        const level = h.tagName.substring(1);
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = title;
        a.className = 'nav-h' + level;
        a.title = title;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        navList.appendChild(li);
        currentTocHeadings.push({ el: h, link: a });
    });
    updateScrollSpy();
}

/* Single rAF-throttled scroll handler drives scroll-spy, the reading-progress
   bar and the back-to-top button -- one listener doing all the work keeps
   scrolling smooth (no extra runtime over the original two listeners). */
let spyRaf = null;
function updateScrollSpy() {
    if (spyRaf) return;
    spyRaf = requestAnimationFrame(() => {
        spyRaf = null;
        const scrollY = window.scrollY;

        // Reading progress + back-to-top (run regardless of TOC contents).
        const max = document.documentElement.scrollHeight - window.innerHeight;
        const pct = max > 0 ? Math.min(100, (scrollY / max) * 100) : 0;
        if (readProgress) readProgress.style.width = pct + '%';
        if (toTopBtn) toTopBtn.classList.toggle('show', scrollY > 480);

        if (currentTocHeadings.length === 0) return;
        const offset = 80;
        let activeEntry = currentTocHeadings[0];
        for (const entry of currentTocHeadings) {
            if (entry.el.offsetTop <= scrollY + offset) {
                activeEntry = entry;
            } else {
                break;
            }
        }
        currentTocHeadings.forEach(e => e.link.classList.remove('nav-active'));
        if (activeEntry) {
            // Only update the highlight. Do NOT programmatically scroll either
            // sidebar -- they should stay put and move only when the user
            // scrolls them. (The previous code scrolled the wrong sidebar, the
            // left document list, which made it jump to the top on every click.)
            activeEntry.link.classList.add('nav-active');
        }
    });
}

/* ───── iOS-style condensing navbar (hide on scroll down, show on scroll up) ───── */
/* - Nagesh N Nazare - */
function updateNavCondense() {
    const y = window.scrollY;
    const NAV_TOP = 8;       // always expanded near the very top
    const NAV_TRIGGER = 72;  // must scroll past this before condensing
    const DELTA = 5;         // ignore tiny jitters
    if (y <= NAV_TOP) {
        document.body.classList.remove('nav-condensed');
    } else if (y > navLastY + DELTA && y > NAV_TRIGGER) {
        document.body.classList.add('nav-condensed');   // scrolling down
    } else if (y < navLastY - DELTA) {
        document.body.classList.remove('nav-condensed'); // scrolling up
    }
    navLastY = y;
}

/* One scroll listener for everything (was two). */
window.addEventListener('scroll', function () {
    updateNavCondense();
    updateScrollSpy();
}, { passive: true });

if (toTopBtn) {
    toTopBtn.addEventListener('click', function () {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

const tocSidebar = document.getElementById('tocSidebar');
const tocToggle = document.getElementById('tocToggle');

function toggleSidebar() {
    const collapsed = sidebarNav.classList.toggle('collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
    if (!collapsed && window.innerWidth <= 1024) {
        tocSidebar.classList.add('collapsed');
        document.body.classList.add('toc-collapsed');
    }
    LS.set('doc-sidebar', collapsed ? 'closed' : 'open');
}

function toggleToc() {
    const collapsed = tocSidebar.classList.toggle('collapsed');
    document.body.classList.toggle('toc-collapsed', collapsed);
    if (!collapsed && window.innerWidth <= 1024) {
        sidebarNav.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
    }
    LS.set('doc-toc', collapsed ? 'closed' : 'open');
}

sidebarToggle.addEventListener('click', toggleSidebar);
tocToggle.addEventListener('click', toggleToc);

document.addEventListener('click', (e) => {
    if (window.innerWidth <= 1024) {
        if (!sidebarNav.contains(e.target) && !tocSidebar.contains(e.target) &&
            !sidebarToggle.contains(e.target) && !tocToggle.contains(e.target)) {
            sidebarNav.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
            tocSidebar.classList.add('collapsed');
            document.body.classList.add('toc-collapsed');
        }
    }
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'b' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleSidebar();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'i' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleToc();
    }
});

/* ───── Anchor + cross-document link interception ───── */
/* - Nagesh N Nazare - */

/* Find an element by id, preferring the given panel (heading ids can collide
   across documents because each file is converted independently). */
function findById(id, preferredPanel) {
    if (preferredPanel) {
        const scoped = preferredPanel.querySelector('[id="' + id.replace(/(["\\])/g, '\\$1') + '"]');
        if (scoped) return scoped;
    }
    return document.getElementById(id);
}

function scrollToTarget(target) {
    requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function gotoAnchor(idx, anchor) {
    activateTab(idx, !anchor);
    const panel = document.getElementById('panel-' + idx);
    if (anchor) {
        const target = findById(anchor, panel);
        if (target) { scrollToTarget(target); return; }
    }
}

/* ───── Navigation history (browser-style back button) ─────
   Whenever a link takes the reader to another section/document, remember where
   they were (which tab + scroll position) so the navbar back button can return
   them to exactly that spot. */
/* - Nagesh N Nazare - */
const navBackBtn = document.getElementById('navBack');
let navHistory = [];

function currentTabIdx() {
    const v = parseInt(docSelect.value, 10);
    return isNaN(v) ? 0 : v;
}

function updateBackBtn() {
    if (navBackBtn) navBackBtn.disabled = navHistory.length === 0;
}

function pushHistory() {
    navHistory.push({ idx: currentTabIdx(), y: window.scrollY });
    if (navHistory.length > 200) navHistory.shift();
    updateBackBtn();
}

function navBack() {
    const state = navHistory.pop();
    if (!state) return;
    activateTab(state.idx, false);
    // Restore the exact scroll position after the panel becomes visible.
    requestAnimationFrame(() => window.scrollTo({ top: state.y, behavior: 'auto' }));
    updateBackBtn();
}

if (navBackBtn) navBackBtn.addEventListener('click', navBack);
document.addEventListener('keydown', (e) => {
    if (e.altKey && e.key === 'ArrowLeft' && !overlay.classList.contains('open')) {
        e.preventDefault();
        navBack();
    }
});

document.addEventListener('click', function(e) {
    const link = e.target.closest('a[href]');
    if (!link) return;
    // Only handle links that live inside document content. Links in the
    // sidebars (TOC "on this page", document list) have their own handlers;
    // letting this run for them would resolve duplicate heading ids against
    // the wrong panel (every same-template doc shares the same ids).
    const ownerPanel = link.closest('.tab-content');
    if (!ownerPanel) return;
    const href = link.getAttribute('href');
    if (!href) return;

    // In-page anchor: resolve within the panel that owns the link first.
    if (href.charAt(0) === '#') {
        const id = href.substring(1);
        if (!id) return;
        const target = findById(id, ownerPanel);
        if (target) {
            e.preventDefault();
            pushHistory();
            const dest = target.closest('.tab-content');
            if (dest) {
                const m = dest.id.match(/^panel-(\d+)$/);
                if (m) activateTab(parseInt(m[1], 10), false);
            }
            scrollToTarget(target);
        }
        return;
    }

    // Cross-document link to another bundled doc (file or folder), optionally #anchor.
    const md = mdTarget(href, baseDirOf(link));
    if (md) {
        e.preventDefault();
        pushHistory();
        gotoAnchor(md.idx, md.anchor);
    }
});

/* ───── Startup ───── */
/* - Nagesh N Nazare - */

// Restore persisted sidebar / TOC open state (only on desktop, where the
// drawers don't overlay the content).
if (window.innerWidth > 1024) {
    if (LS.get('doc-sidebar') === 'open') {
        sidebarNav.classList.remove('collapsed');
        document.body.classList.remove('sidebar-collapsed');
    }
    if (LS.get('doc-toc') === 'open') {
        tocSidebar.classList.remove('collapsed');
        document.body.classList.remove('toc-collapsed');
    }
}

const hash = location.hash || '';
const tabMatch = hash.match(/^#tab-(\d+)$/);
if (tabMatch) {
    activateTab(Math.min(parseInt(tabMatch[1], 10), TAB_DATA.length - 1));
} else if (hash.length > 1) {
    const targetId = hash.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
        const panels = document.querySelectorAll('.tab-content');
        for (let i = 0; i < panels.length; i++) {
            if (panels[i].contains(target)) {
                activateTab(i, false);
                requestAnimationFrame(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                break;
            }
        }
    } else {
        activateTab(0);
    }
} else {
    // No explicit target: resume the last-read document + scroll position.
    const lastIdx = parseInt(LS.get('doc-last-idx'), 10);
    const lastY = parseInt(LS.get('doc-last-y'), 10);
    if (!isNaN(lastIdx) && lastIdx >= 0 && lastIdx < TAB_DATA.length) {
        activateTab(lastIdx, false);
        if (!isNaN(lastY) && lastY > 0) {
            requestAnimationFrame(() => window.scrollTo({ top: lastY, behavior: 'auto' }));
        }
    } else {
        activateTab(0);
    }
}
</script>
